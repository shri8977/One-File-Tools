name: Bug Report
description: Report a bug in an existing tool or the landing page.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Sorry you hit a bug! Please fill in the details below so we can fix it.

  - type: input
    id: tool-name
    attributes:
      label: Affected Tool or Page
      description: Which tool or page has the bug?
      placeholder: e.g. Open Graph Inspector, Landing Page, Build Script
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what went wrong.
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Open the tool
        2. Enter '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and any relevant details.
      placeholder: |
        - Browser: Chrome 126
        - OS: macOS 15
        - Screen size: 1440x900

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the bug. (optional)
      placeholder: Drag and drop images here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked existing issues for duplicates.
          required: true
        - label: I have tested this in at least one modern browser.
          required: true
