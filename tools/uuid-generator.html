<!--
UUID Generator
Single-file UUID v4 generator.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UUID Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #0e1a2b;
        --grid-line: #16263d;
        --panel: #142440;
        --panel-border: #23385c;
        --accent: #ff6b35;
        --accent-dim: #c2410c;
        --cyan: #5eead4;
        --text: #e9eff7;
        --text-muted: #8aa0c2;
        --text-dim: #4f6388;
        --radius-sm: 8px;
        --radius-md: 14px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 28px 28px;
        color: var(--text);
        padding: 48px 20px 64px;
        min-height: 100vh;
      }

      .app {
        max-width: 680px;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .wordmark {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(40px, 7vw, 58px);
        letter-spacing: -0.01em;
        line-height: 1;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        margin-top: 10px;
      }

      .studio {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.5);
      }

      .output-area {
        position: relative;
        margin-bottom: 24px;
      }

      .output-area textarea {
        width: 100%;
        min-height: 140px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        color: var(--cyan);
        line-height: 1.6;
        resize: vertical;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .output-area textarea:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 2px rgba(94, 234, 212, 0.2);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        padding-top: 24px;
        border-top: 1px solid var(--panel-border);
      }

      .count-selector {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .count-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .unit-toggle {
        display: inline-flex;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        padding: 3px;
      }

      .unit-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        border: none;
        background: transparent;
        color: var(--text-muted);
        padding: 7px 16px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .unit-btn.active {
        background: var(--panel-border);
        color: var(--text);
      }

      .unit-btn:hover:not(.active) {
        color: var(--text);
      }

      .actions {
        display: flex;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: #1a0f08;
      }

      .btn-primary:hover {
        background: #ff7a4a;
        transform: translateY(-1px);
      }

      .btn-secondary {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--panel-border);
      }

      .btn-secondary:hover {
        border-color: var(--text-muted);
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* Animations */
      .hero,
      .studio {
        animation: rise 0.5s ease both;
      }
      .studio {
        animation-delay: 0.1s;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .controls {
          flex-direction: column;
          align-items: stretch;
        }
        .actions {
          flex-direction: column;
        }
        .btn {
          justify-content: center;
        }
        .count-selector {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utility</div>
        <h1 class="wordmark">UUID Gen</h1>
        <p class="tagline">Generate random v4 UUIDs instantly, offline.</p>
      </header>

      <main class="studio">
        <div class="output-area">
          <textarea id="output" readonly aria-label="Generated UUIDs"></textarea>
        </div>

        <div class="controls">
          <div class="count-selector">
            <span class="count-label">Quantity</span>
            <div class="unit-toggle" id="countToggle">
              <button class="unit-btn active" data-count="1">1</button>
              <button class="unit-btn" data-count="5">5</button>
              <button class="unit-btn" data-count="10">10</button>
              <button class="unit-btn" data-count="50">50</button>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-secondary" id="copyBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="11" height="11" rx="2" />
                <path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1" />
              </svg>
              <span id="copyLabel">Copy</span>
            </button>
            <button class="btn btn-primary" id="generateBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2" />
              </svg>
              <span>Generate</span>
            </button>
          </div>
        </div>
      </main>
    </div>

    <script>
      const outputEl = document.getElementById("output");
      const generateBtn = document.getElementById("generateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const copyLabel = document.getElementById("copyLabel");
      const countBtns = document.querySelectorAll(".unit-btn");

      let currentCount = 1;

      // Generate a cryptographically secure UUID v4 (RFC 4122 §4.4).
      // Priority order:
      //   1. crypto.randomUUID()       — native, available in Chrome 92+, Firefox 95+, Safari 15.4+
      //   2. crypto.getRandomValues()  — CSPRNG fallback, available since Chrome 11 / Firefox 21 / Safari 6.1
      //   3. Error                     — no crypto support; refuse to silently generate insecure UUIDs
      function generateUUID() {
        // 1. Native implementation
        if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
          return crypto.randomUUID();
        }

        // 2. CSPRNG fallback via getRandomValues — builds a valid v4 UUID manually
        if (typeof crypto !== "undefined" && typeof crypto.getRandomValues === "function") {
          const bytes = new Uint8Array(16);
          crypto.getRandomValues(bytes);

          // Set version 4 bits: bits 12-15 of byte 6 = 0100
          bytes[6] = (bytes[6] & 0x0f) | 0x40;

          // Set variant bits: bits 6-7 of byte 8 = 10 (RFC 4122 variant)
          bytes[8] = (bytes[8] & 0x3f) | 0x80;

          // Format as xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx
          return [
            bytes.slice(0, 4),
            bytes.slice(4, 6),
            bytes.slice(6, 8),
            bytes.slice(8, 10),
            bytes.slice(10, 16)
          ]
            .map((seg) => Array.from(seg).map((b) => b.toString(16).padStart(2, "0")).join(""))
            .join("-");
        }

        // 3. No crypto support — surface a clear error instead of silently using Math.random()
        throw new Error(
          "Cryptographically secure random number generation is not available in this environment. " +
          "UUID generation has been disabled to prevent insecure output."
        );
      }

      function updateOutput() {
        try {
          const uuids = [];
          for (let i = 0; i < currentCount; i++) {
            uuids.push(generateUUID());
          }
          outputEl.value = uuids.join("\n");
          outputEl.style.color = "";
        } catch (err) {
          // generateUUID throws when no cryptographically secure RNG is available.
          // Surface the error clearly rather than silently falling back to Math.random().
          outputEl.value = "Error: " + err.message;
          outputEl.style.color = "var(--accent)";
        }
      }

      countBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          countBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentCount = parseInt(btn.dataset.count, 10);
          updateOutput();
        });
      });

      generateBtn.addEventListener("click", () => {
        const icon = generateBtn.querySelector("svg");
        icon.style.transition = "transform 0.3s ease";
        icon.style.transform = `rotate(180deg)`;
        setTimeout(() => {
          icon.style.transition = "none";
          icon.style.transform = `rotate(0deg)`;
        }, 300);

        updateOutput();
      });

      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(outputEl.value);
          copyLabel.textContent = "Copied!";
        } catch (err) {
          copyLabel.textContent = "Error";
        }
        setTimeout(() => {
          copyLabel.textContent = "Copy";
        }, 2000);
      });

      // Initial generation
      updateOutput();
    </script>
  </body>
</html>
