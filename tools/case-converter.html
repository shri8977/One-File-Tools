<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Converter — One File Tools</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }

      /* ========================================
       Dark Mode
       ======================================== */
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #121212;
        }

        textarea,
        .output-box {
          background: #171717;
          border-color: #333;
          color: #000000;
        }

        button {
          background: #2563eb;
          color: #fff;
        }

        button:hover {
          background: #1d4ed8;
        }

        button.secondary {
          background: #262626;
          color: #e5e5e5;
          border-color: #404040;
        }

        button.secondary:hover {
          background: #333;
        }

        .stat {
          color: #a3a3a3;
        }

        footer a {
          color: #60a5fa;
        }
      }

      /* ========================================
       Header
       ======================================== */
      header {
        margin-bottom: 1.5rem;
      }

      header h1 {
        font-size: 1.75rem;
        margin-bottom: 0.25rem;
        color: rgb(248, 248, 248);
      }

      header p {
        color: #666;
      }

      @media (prefers-color-scheme: dark) {
        header p {
          color: #a3a3a3;
        }
      }

      /* ========================================
       Layout
       ======================================== */
      main {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      label {
        font-weight: 600;
        font-size: 0.9rem;
      }

      textarea {
        width: 100%;
        min-height: 140px;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        resize: vertical;
        background: #fff;
        color: inherit;
      }

      textarea:focus,
      button:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }

      .stat {
        font-size: 0.85rem;
        color: #666;
      }

      /* ========================================
       Buttons
       ======================================== */
      .button-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.6rem;
      }

      button {
        padding: 0.65rem 1rem;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      button:hover {
        background: #1d4ed8;
      }

      button.secondary {
        background: #eee;
        color: #1a1a1a;
        border: 1px solid #ddd;
      }

      button.secondary:hover {
        background: #e2e2e2;
      }

      .actions-row {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      /* ========================================
       Output
       ======================================== */
      .output-box {
        width: 100%;
        min-height: 140px;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: inherit;
      }

      .copy-feedback {
        font-size: 0.85rem;
        color: #16a34a;
        min-height: 1.2rem;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #666;
        text-align: center;
      }

      footer a {
        color: #2563eb;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        body {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Case Converter</h1>
      <p>Transform text between UPPERCASE, lowercase, Title Case, Sentence case, camelCase, PascalCase, snake_case and more.</p>
    </header>

    <main>
      <div class="field-group">
        <label for="input-text">Input text</label>
        <textarea id="input-text" placeholder="Type or paste your text here..." aria-label="Input text"></textarea>
        <span class="stat" id="input-stats">0 characters, 0 words</span>
      </div>

      <div class="field-group">
        <label>Convert to</label>
        <div class="button-grid" id="case-buttons">
          <button data-case="upper">UPPERCASE</button>
          <button data-case="lower">lowercase</button>
          <button data-case="title">Title Case</button>
          <button data-case="sentence">Sentence case</button>
          <button data-case="camel">camelCase</button>
          <button data-case="pascal">PascalCase</button>
          <button data-case="snake">snake_case</button>
          <button data-case="kebab">kebab-case</button>
          <button data-case="constant">CONSTANT_CASE</button>
          <button data-case="alternating">aLtErNaTiNg CaSe</button>
          <button data-case="inverse">iNVERSE cASE</button>
        </div>
      </div>

      <div class="field-group">
        <label for="output-text">Result</label>
        <div class="output-box" id="output-text" tabindex="0" aria-label="Converted text output"></div>
        <div class="actions-row">
          <button class="secondary" id="copy-btn" type="button">Copy result</button>
          <button class="secondary" id="clear-btn" type="button">Clear all</button>
        </div>
        <span class="copy-feedback" id="copy-feedback" role="status"></span>
      </div>
    </main>

    <script>
      const inputText = document.getElementById("input-text");
      const outputText = document.getElementById("output-text");
      const inputStats = document.getElementById("input-stats");
      const copyBtn = document.getElementById("copy-btn");
      const clearBtn = document.getElementById("clear-btn");
      const copyFeedback = document.getElementById("copy-feedback");
      const caseButtons = document.getElementById("case-buttons");

      let activeCase = "upper";

      // Splits text into words, respecting existing camelCase/snake_case/kebab-case boundaries
      const toWords = (str) => {
        return str
          .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
          .replace(/[_\-]+/g, " ")
          .trim()
          .split(/\s+/)
          .filter(Boolean);
      };

      const converters = {
        upper: (str) => str.toUpperCase(),
        lower: (str) => str.toLowerCase(),
        title: (str) => str.toLowerCase().replace(/\b\w/g, (char) => char.toUpperCase()),
        sentence: (str) => {
          const lower = str.toLowerCase();
          return lower.replace(/(^\s*\w|[.!?]\s*\w)/g, (match) => match.toUpperCase());
        },
        camel: (str) => {
          const words = toWords(str).map((w) => w.toLowerCase());
          return words.map((w, i) => (i === 0 ? w : w.charAt(0).toUpperCase() + w.slice(1))).join("");
        },
        pascal: (str) => {
          const words = toWords(str).map((w) => w.toLowerCase());
          return words.map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join("");
        },
        snake: (str) =>
          toWords(str)
            .map((w) => w.toLowerCase())
            .join("_"),
        kebab: (str) =>
          toWords(str)
            .map((w) => w.toLowerCase())
            .join("-"),
        constant: (str) =>
          toWords(str)
            .map((w) => w.toUpperCase())
            .join("_"),
        alternating: (str) =>
          str
            .split("")
            .map((char, i) => (i % 2 === 0 ? char.toLowerCase() : char.toUpperCase()))
            .join(""),
        inverse: (str) =>
          str
            .split("")
            .map((char) => (char === char.toUpperCase() ? char.toLowerCase() : char.toUpperCase()))
            .join("")
      };

      const updateStats = () => {
        const text = inputText.value;
        const charCount = text.length;
        const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
        inputStats.textContent = `${charCount} characters, ${wordCount} words`;
      };

      const setActiveButton = (caseKey) => {
        [...caseButtons.children].forEach((btn) => {
          btn.style.outline = btn.dataset.case === caseKey ? "2px solid #2563eb" : "none";
        });
      };

      const convertAndRender = () => {
        const converter = converters[activeCase];
        outputText.textContent = converter ? converter(inputText.value) : inputText.value;
      };

      inputText.addEventListener("input", () => {
        updateStats();
        convertAndRender();
      });

      caseButtons.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-case]");
        if (!btn) return;
        activeCase = btn.dataset.case;
        setActiveButton(activeCase);
        convertAndRender();
      });

      copyBtn.addEventListener("click", async () => {
        const text = outputText.textContent;
        if (!text) {
          copyFeedback.textContent = "Nothing to copy yet.";
          setTimeout(() => (copyFeedback.textContent = ""), 2000);
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          copyFeedback.textContent = "Copied to clipboard!";
        } catch (err) {
          copyFeedback.textContent = "Copy failed. Please copy manually.";
        }
        setTimeout(() => (copyFeedback.textContent = ""), 2000);
      });

      clearBtn.addEventListener("click", () => {
        inputText.value = "";
        outputText.textContent = "";
        updateStats();
        inputText.focus();
      });

      // Initial state
      setActiveButton(activeCase);
      updateStats();
    </script>
  </body>
</html>
