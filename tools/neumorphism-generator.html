<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neumorphism Generator — One File Tools</title>
    <style>
      /* ========================================
         Reset & Base
         ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #e0e0e0;
        --bg-light: #ffffff;
        --bg-dark: #bebebe;
        --text: #333333;
        --text-muted: #666666;
        --accent: #3498db;
        --accent-hover: #2980b9;
        --control-bg: rgba(0, 0, 0, 0.04);
        --pre-bg: rgba(0, 0, 0, 0.06);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 1100px;
        margin: 0 auto;
        background: var(--bg);
        color: var(--text);
      }

      header p {
        margin-top: 0.25rem;
        color: var(--text-muted);
      }

      /* ========================================
         Dark Mode
         ======================================== */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #2d2d2d;
          --bg-light: #3d3d3d;
          --bg-dark: #1d1d1d;
          --text: #e5e5e5;
          --text-muted: #aaaaaa;
          --control-bg: rgba(255, 255, 255, 0.06);
          --pre-bg: rgba(255, 255, 255, 0.08);
        }
      }

      /* ========================================
         Layout
         ======================================== */
      .main-layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 2rem;
        margin-top: 2rem;
      }

      @media (max-width: 700px) {
        .main-layout {
          grid-template-columns: 1fr;
        }
        .controls {
          border-right: none !important;
          padding-right: 0 !important;
          border-bottom: 1px solid var(--bg-dark);
          padding-bottom: 1.5rem;
        }
      }

      /* ========================================
         Controls
         ======================================== */
      .controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        background: var(--control-bg);
        padding: 1.5rem;
        border-radius: 12px;
      }

      .controls label {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .label-value {
        font-weight: normal;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      input[type="range"] {
        width: 100%;
      }

      select {
        padding: 0.4rem;
        border-radius: 4px;
        border: 1px solid var(--bg-dark);
        font-size: 0.9rem;
        background: var(--bg);
        color: var(--text);
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .color-row input[type="color"] {
        width: 40px;
        height: 32px;
        border: 1px solid var(--bg-dark);
        border-radius: 4px;
        padding: 2px;
        cursor: pointer;
        background: var(--bg);
      }

      .color-hex {
        font-size: 0.85rem;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        color: var(--text-muted);
      }

      /* ========================================
         Preview
         ======================================== */
      .preview-area {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        background: var(--bg);
        border-radius: 20px;
      }

      #target {
        width: 200px;
        height: 200px;
        background: var(--bg);
        transition:
          box-shadow 0.2s,
          border-radius 0.2s;
      }

      /* ========================================
         Code Output
         ======================================== */
      .code-container {
        margin-top: 1rem;
      }

      pre {
        background: var(--pre-bg);
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.85rem;
        line-height: 1.5;
      }

      .btn {
        padding: 0.6rem 1rem;
        cursor: pointer;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 4px;
        width: 100%;
        font-weight: 600;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }

      .btn:hover {
        background: var(--accent-hover);
      }

      /* ========================================
         Toast
         ======================================== */
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #1a1a1a;
        color: white;
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        font-size: 0.85rem;
        opacity: 0;
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
        pointer-events: none;
        z-index: 10;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (prefers-color-scheme: dark) {
        .toast {
          background: #e5e5e5;
          color: #1a1a1a;
        }
      }

      /* ========================================
         Footer
         ======================================== */
      footer {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--bg-dark);
        font-size: 0.85rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Neumorphism Generator</h1>
      <p>Create soft, extruded UI elements with customizable neumorphic shadows.</p>
    </header>

    <main class="main-layout">
      <section class="controls">
        <label>
          <div class="label-row">
            <span>Distance</span>
            <span class="label-value" id="distValue">20px</span>
          </div>
          <input type="range" id="dist" min="0" max="50" value="20" />
        </label>

        <label>
          <div class="label-row">
            <span>Blur</span>
            <span class="label-value" id="blurValue">60px</span>
          </div>
          <input type="range" id="blur" min="0" max="100" value="60" />
        </label>

        <label>
          <div class="label-row">
            <span>Border Radius</span>
            <span class="label-value" id="radiusValue">20px</span>
          </div>
          <input type="range" id="radius" min="0" max="100" value="20" />
        </label>

        <label>
          <div class="label-row">
            <span>Intensity</span>
            <span class="label-value" id="intensityValue">50%</span>
          </div>
          <input type="range" id="intensity" min="0" max="100" value="50" />
        </label>

        <label>
          Style
          <select id="type">
            <option value="convex">Convex (raised)</option>
            <option value="concave">Concave (pressed)</option>
            <option value="flat">Flat</option>
          </select>
        </label>

        <label>
          Background Color
          <div class="color-row">
            <input type="color" id="bgColor" value="#e0e0e0" />
            <span class="color-hex" id="bgColorHex">#e0e0e0</span>
          </div>
        </label>

        <div class="code-container">
          <pre id="cssCode"></pre>
          <button class="btn" id="copyBtn">Copy CSS</button>
        </div>
      </section>

      <section class="preview-area" id="previewArea">
        <div id="target"></div>
      </section>
    </main>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <footer>
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
      const els = {
        dist: document.getElementById("dist"),
        blur: document.getElementById("blur"),
        radius: document.getElementById("radius"),
        intensity: document.getElementById("intensity"),
        type: document.getElementById("type"),
        bgColor: document.getElementById("bgColor"),
        bgColorHex: document.getElementById("bgColorHex"),
        distValue: document.getElementById("distValue"),
        blurValue: document.getElementById("blurValue"),
        radiusValue: document.getElementById("radiusValue"),
        intensityValue: document.getElementById("intensityValue"),
        target: document.getElementById("target"),
        previewArea: document.getElementById("previewArea"),
        cssCode: document.getElementById("cssCode"),
        copyBtn: document.getElementById("copyBtn"),
        toast: document.getElementById("toast")
      };

      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
      }

      function rgbToHex(r, g, b) {
        return (
          "#" +
          [r, g, b]
            .map((v) =>
              Math.max(0, Math.min(255, Math.round(v)))
                .toString(16)
                .padStart(2, "0")
            )
            .join("")
        );
      }

      function computeShadowColors(hex, intensity) {
        const { r, g, b } = hexToRgb(hex);
        const factor = intensity / 100;
        const light = rgbToHex(r + (255 - r) * factor, g + (255 - g) * factor, b + (255 - b) * factor);
        const dark = rgbToHex(r * (1 - factor), g * (1 - factor), b * (1 - factor));
        return { light, dark };
      }

      function update() {
        const d = parseInt(els.dist.value);
        const b = parseInt(els.blur.value);
        const r = parseInt(els.radius.value);
        const intensity = parseInt(els.intensity.value);
        const type = els.type.value;
        const bg = els.bgColor.value;

        els.distValue.textContent = d + "px";
        els.blurValue.textContent = b + "px";
        els.radiusValue.textContent = r + "px";
        els.intensityValue.textContent = intensity + "%";
        els.bgColorHex.textContent = bg;

        const { light, dark } = computeShadowColors(bg, intensity);

        let shadow;
        if (type === "convex") {
          shadow = `${d}px ${d}px ${b}px ${dark}, -${d}px -${d}px ${b}px ${light}`;
        } else if (type === "concave") {
          shadow = `inset ${d}px ${d}px ${b}px ${dark}, inset -${d}px -${d}px ${b}px ${light}`;
        } else {
          shadow = `${d}px ${d}px ${b}px ${dark}, -${d}px -${d}px ${b}px ${light}, inset ${d}px ${d}px ${b}px ${dark}, inset -${d}px -${d}px ${b}px ${light}`;
        }

        els.target.style.boxShadow = shadow;
        els.target.style.borderRadius = r + "px";
        els.target.style.background = bg;
        els.previewArea.style.background = bg;

        const css = [`background: ${bg};`, `border-radius: ${r}px;`, `box-shadow: ${shadow};`];
        els.cssCode.textContent = css.join("\n");
      }

      function showToast() {
        els.toast.classList.add("show");
        setTimeout(() => els.toast.classList.remove("show"), 1500);
      }

      els.copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(els.cssCode.textContent).then(showToast);
      });

      document.querySelectorAll(".controls select, .controls input").forEach((el) => {
        el.addEventListener("input", update);
        el.addEventListener("change", update);
      });

      update();
    </script>
  </body>
</html>
