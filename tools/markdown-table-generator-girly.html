<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Table Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg: #fff5f9;
  --surface: #ffe9f2;
  --surface-2: #ffdcec;
  --surface-3: #ffcce3;
  --border: #ffbbdb;
  --text: #5b2a45;
  --text-dim: #9c5b7f;
  --text-faint: #c48aab;
  --accent: #ff5c9e;
  --accent-soft: #ff5c9e1f;
  --accent-2: #b07cf0;
  --accent-2-soft: #b07cf01f;
  --danger: #e0568a;
  --radius: 16px;
  --mono: 'Space Mono', Consolas, monospace;
  --sans: 'Nunito', Arial, sans-serif;
  --display: 'Quicksand', var(--sans);
}

*{ box-sizing: border-box; }

body{
  margin:0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height:100vh;
  background-image:
    radial-gradient(circle at 8% 12%, #ffd6ea 0%, transparent 40%),
    radial-gradient(circle at 92% 88%, #e9d6ff 0%, transparent 42%);
  background-attachment: fixed;
}

.wrap{
  max-width: 1240px;
  margin: 0 auto;
  padding: 20px 20px 50px;
}

header.top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom: 16px;
  padding-bottom:12px;
  border-bottom: 1px solid var(--border);
}

.brand h1{
  margin:0;
  font-size: 24px;
  font-weight: 700;
  font-family: var(--display);
  color: var(--accent);
}
.brand h1 span{ color: var(--accent-2); }
.brand p{
  margin: 4px 0 0;
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--text-faint);
}
.brand p::before{ content:"✿ "; }

.stat-pill{
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  white-space:nowrap;
}
.stat-pill b{ color: var(--text); }

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap: 10px;
  align-items:center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 16px;
}

.tgroup{
  display:flex;
  align-items:center;
  gap:6px;
  padding-right:10px;
  margin-right:4px;
  border-right: 1px solid var(--border);
}
.tgroup:last-child{ border-right:none; }

.tgroup label{
  font-size: 11.5px;
  color: var(--text-dim);
  font-family: var(--sans);
  margin-right: 2px;
}

button.icon-btn{
  width: 26px; height:24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #ffffff;
  color: var(--accent);
  cursor:pointer;
  font-family: var(--sans);
  font-weight:700;
  font-size:14px;
  line-height:1;
  display:flex; align-items:center; justify-content:center;
}
button.icon-btn:hover{ border-color: var(--accent); background: var(--accent-soft); }
button.icon-btn:active{ background: var(--surface-3); }

.count-badge{
  font-family: var(--mono);
  font-weight:700;
  font-size: 13px;
  min-width: 22px;
  text-align:center;
  color: var(--text);
}

select#templateSelect, .text-btn{
  font-family: var(--sans);
  font-size: 13px;
  background: #ffffff;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  cursor:pointer;
}
select#templateSelect:hover, .text-btn:hover{ border-color: var(--accent-2); background: var(--accent-2-soft); }

.text-btn.danger{ color: var(--danger); }
.text-btn.danger:hover{ border-color: var(--danger); background: #fceceb; }

.panels{
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 16px;
  align-items:start;
}
@media (max-width: 880px){
  .panels{ grid-template-columns: 1fr; }
}

.panel{
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow:hidden;
}

.panel-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.panel-head h2{
  margin:0;
  font-size: 13px;
  color: var(--accent-2);
  font-family: var(--display);
  font-weight:700;
}
.panel-body{ padding: 14px; overflow-x:auto; }

/* ---- Builder grid ---- */
.builder-table{
  border-collapse: collapse;
  width:100%;
  font-family: var(--mono);
  font-size: 13.5px;
}
.builder-table td{
  border: 1px solid var(--border);
  position:relative;
  padding: 0;
  vertical-align: top;
}
.pipe-cell{
  position:relative;
  padding: 0;
}
.pipe-cell::before{
  content:"";
}
.pipe-row-end{
  width:14px;
  color: var(--text-faint);
  text-align:center;
  user-select:none;
  border: 1px solid var(--border);
}

.cell-edit{
  min-height: 32px;
  padding: 6px 8px;
  color: var(--text);
  outline:none;
  white-space: pre-wrap;
  word-break: break-word;
}
.cell-edit:focus{ background: var(--surface-2); }
.cell-edit:empty::before{
  content: attr(data-placeholder);
  color: var(--text-faint);
}

.header-row .cell-edit{ color: var(--accent-2); font-weight:700; background: var(--surface); }

tr.remove-row-btn-row td{ padding:0; }

.row-controls, .col-controls{
  display:flex; align-items:center;
}

.rm-btn{
  background:none; border:none; color: var(--text-faint);
  cursor:pointer; font-size:13px; padding: 2px 6px;
}
.rm-btn:hover{ color: var(--danger); }

/* separator / alignment row */
.align-row td{ padding:2px; background: var(--surface); }
.align-toggle{
  display:flex;
  gap:2px;
  font-family: var(--mono);
  font-size:11px;
}
.align-toggle button{
  flex:1;
  background: #ffffff;
  border: 1px solid var(--border);
  color: var(--text-faint);
  padding: 3px 0;
  cursor:pointer;
}
.align-toggle button.active{
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
  font-weight:700;
}

.col-head-row td{ padding-bottom:0; }
.col-tag{
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-faint);
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 4px;
}

/* ---- Output panel ---- */
.tabs{
  display:flex; gap:2px;
}
.tab-btn{
  font-family: var(--sans);
  font-size:12px;
  background: #ffffff;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 10px;
  cursor:pointer;
}
.tab-btn.active{ background: var(--accent-soft); color: var(--accent); font-weight:700; }

.copy-btn{
  display:flex; align-items:center; gap:6px;
  font-family: var(--display);
  font-weight:700;
  font-size:12.5px;
  background: var(--accent);
  color: #ffffff;
  border:1px solid var(--accent);
  border-radius: 10px;
  padding: 5px 14px;
  cursor:pointer;
}
.copy-btn:hover{ background: #ff77ac; }
.copy-btn:active{ background: #e94f8e; }
.copy-btn.copied{ background: #b07cf0; border-color:#b07cf0; color:#ffffff; }

pre#mdOutput{
  margin:0;
  font-family: var(--mono);
  font-size: 13px;
  line-height:1.6;
  color: var(--text);
  white-space: pre;
  overflow-x:auto;
}
pre#mdOutput .pipe{ color: var(--text-faint); }
pre#mdOutput .sep{ color: var(--text-faint); }

.preview-table{
  border-collapse: collapse;
  width:100%;
  font-size: 13.5px;
}
.preview-table th, .preview-table td{
  border: 1px solid var(--border);
  padding: 7px 10px;
  text-align:left;
}
.preview-table th{
  background: var(--surface);
  color: var(--accent-2);
  font-size:12.5px;
  font-weight:700;
}
.preview-table tr:nth-child(even) td{ background: #fff9fb; }

.toast{
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ffffff;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--display);
  font-weight:600;
  font-size: 12.5px;
  padding: 8px 16px;
  border-radius: var(--radius);
  box-shadow: 0 4px 14px rgba(255,92,158,.25);
  opacity:0;
  pointer-events:none;
  transition: all .2s ease;
  z-index: 50;
}
.toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

footer.hint{
  margin-top: 14px;
  font-family: var(--sans);
  font-size: 11.5px;
  color: var(--text-faint);
  text-align:center;
}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <h1>Markdown <span>Table</span> Generator</h1>
      <p>build tables, tune alignment, copy clean markdown</p>
    </div>
    <div class="stat-pill"><b id="statRows">2</b> rows &middot; <b id="statCols">3</b> cols</div>
  </header>

  <div class="toolbar">
    <div class="tgroup">
      <label>Rows</label>
      <button class="icon-btn" id="rmRow">&minus;</button>
      <span class="count-badge" id="rowCount">2</span>
      <button class="icon-btn" id="addRow">+</button>
    </div>
    <div class="tgroup">
      <label>Cols</label>
      <button class="icon-btn" id="rmCol">&minus;</button>
      <span class="count-badge" id="colCount">3</span>
      <button class="icon-btn" id="addCol">+</button>
    </div>
    <div class="tgroup">
      <label>Template</label>
      <select id="templateSelect">
        <option value="">Choose one&hellip;</option>
        <option value="comparison">Comparison</option>
        <option value="api">API Reference</option>
        <option value="features">Feature List</option>
        <option value="changelog">Changelog</option>
      </select>
    </div>
    <div class="tgroup" style="border-right:none;">
      <button class="text-btn danger" id="clearBtn">Clear all</button>
    </div>
  </div>

  <div class="panels">
    <section class="panel">
      <div class="panel-head">
        <h2>Builder</h2>
        <span style="font-family:var(--mono); font-size:11px; color:var(--text-faint);">click cells to edit</span>
      </div>
      <div class="panel-body">
        <table class="builder-table" id="builderTable"></table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="tabs">
          <button class="tab-btn active" data-tab="md">Markdown</button>
          <button class="tab-btn" data-tab="preview">Rendered</button>
        </div>
        <button class="copy-btn" id="copyBtn">
          <span id="copyLabel">Copy</span>
        </button>
      </div>
      <div class="panel-body">
        <pre id="mdOutput"></pre>
        <div id="previewOutput" style="display:none;"></div>
      </div>
    </section>
  </div>

  <footer class="hint">tip &mdash; click a colon marker in the separator row to change column alignment</footer>
</div>

<div class="toast" id="toast">Copied to clipboard ♡</div>

<script>
(function(){
  const ALIGNS = ['left','center','right'];
  const ALIGN_LABEL = { left: ':--', center: ':-:', right: '--:' };

  let cols = 3;
  let rows = 2; // data rows, excluding header
  let header = ['Feature','Free','Pro'];
  let data = [
    ['Basic access','Yes','Yes'],
    ['Priority support','No','Yes']
  ];
  let aligns = ['left','left','left'];

  const builderTable = document.getElementById('builderTable');
  const mdOutput = document.getElementById('mdOutput');
  const previewOutput = document.getElementById('previewOutput');
  const rowCountEl = document.getElementById('rowCount');
  const colCountEl = document.getElementById('colCount');
  const statRows = document.getElementById('statRows');
  const statCols = document.getElementById('statCols');

  function escapeCell(s){
    return (s || '').replace(/\|/g, '\\|').replace(/\n/g, '<br>');
  }

  function normalizeShapes(){
    header = header.slice(0, cols);
    while(header.length < cols) header.push('');
    data = data.slice(0, rows);
    while(data.length < rows) data.push(new Array(cols).fill(''));
    data = data.map(r => {
      r = r.slice(0, cols);
      while(r.length < cols) r.push('');
      return r;
    });
    aligns = aligns.slice(0, cols);
    while(aligns.length < cols) aligns.push('left');
  }

  function renderBuilder(){
    normalizeShapes();
    rowCountEl.textContent = rows;
    colCountEl.textContent = cols;
    statRows.textContent = rows + 1;
    statCols.textContent = cols;

    let html = '';

    // header row
    html += '<tr class="header-row col-head-row">';
    for(let c=0;c<cols;c++){
      html += `<td class="pipe-cell">
        <div class="cell-edit" contenteditable="true" data-role="header" data-c="${c}" data-placeholder="Header ${c+1}">${header[c] ? escapeUserText(header[c]) : ''}</div>
      </td>`;
    }
    html += `<td class="pipe-row-end">|</td></tr>`;

    // alignment / separator row
    html += '<tr class="align-row">';
    for(let c=0;c<cols;c++){
      html += `<td class="pipe-cell">
        <div class="align-toggle" data-c="${c}">
          <button data-a="left" class="${aligns[c]==='left'?'active':''}">:--</button>
          <button data-a="center" class="${aligns[c]==='center'?'active':''}">:-:</button>
          <button data-a="right" class="${aligns[c]==='right'?'active':''}">--:</button>
        </div>
      </td>`;
    }
    html += `<td class="pipe-row-end">|</td></tr>`;

    // data rows
    for(let r=0;r<rows;r++){
      html += '<tr class="data-row">';
      for(let c=0;c<cols;c++){
        html += `<td class="pipe-cell">
          <div class="cell-edit" contenteditable="true" data-role="data" data-r="${r}" data-c="${c}" data-placeholder="&hellip;">${data[r][c] ? escapeUserText(data[r][c]) : ''}</div>
        </td>`;
      }
      html += `<td class="pipe-row-end"><button class="rm-btn" data-remove-row="${r}" title="Remove row">&times;</button></td></tr>`;
    }

    builderTable.innerHTML = html;
    attachCellHandlers();
    renderOutput();
  }

  function escapeUserText(s){
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function attachCellHandlers(){
    builderTable.querySelectorAll('.cell-edit').forEach(el=>{
      el.addEventListener('input', ()=>{
        const role = el.dataset.role;
        const c = parseInt(el.dataset.c, 10);
        const val = el.innerText;
        if(role === 'header'){
          header[c] = val;
        } else {
          const r = parseInt(el.dataset.r, 10);
          data[r][c] = val;
        }
        renderOutput();
      });
    });

    builderTable.querySelectorAll('.align-toggle button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const wrap = btn.closest('.align-toggle');
        const c = parseInt(wrap.dataset.c, 10);
        aligns[c] = btn.dataset.a;
        wrap.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
        renderOutput();
      });
    });

    builderTable.querySelectorAll('[data-remove-row]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const r = parseInt(btn.dataset.removeRow, 10);
        if(rows <= 1) return;
        data.splice(r,1);
        rows -= 1;
        renderBuilder();
      });
    });
  }

  function alignSep(a){
    if(a === 'center') return ':---:';
    if(a === 'right') return '----:';
    return ':----';
  }

  function buildMarkdown(){
    const escRow = arr => '| ' + arr.map(v => escapeMd(v)).join(' | ') + ' |';
    let lines = [];
    lines.push(escRow(header));
    lines.push('| ' + aligns.map(alignSep).join(' | ') + ' |');
    data.forEach(r => lines.push(escRow(r)));
    return lines.join('\n');
  }

  function escapeMd(s){
    return (s || '').replace(/\|/g,'\\|').trim() || ' ';
  }

  function highlightMd(md){
    return md
      .split('\n')
      .map(line => line.replace(/\|/g, '<span class="pipe">|</span>')
                        .replace(/(:?-{3,}:?)/g, '<span class="sep">$1</span>'))
      .join('\n');
  }

  function buildPreviewTable(){
    let html = '<table class="preview-table"><thead><tr>';
    header.forEach((h,c)=>{
      html += `<th style="text-align:${aligns[c]}">${escapeCell(h) || '&nbsp;'}</th>`;
    });
    html += '</tr></thead><tbody>';
    data.forEach(r=>{
      html += '<tr>';
      r.forEach((v,c)=>{
        html += `<td style="text-align:${aligns[c]}">${escapeCell(v) || '&nbsp;'}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  function renderOutput(){
    const md = buildMarkdown();
    mdOutput.innerHTML = highlightMd(md);
    previewOutput.innerHTML = buildPreviewTable();
  }

  // ---- toolbar actions ----
  document.getElementById('addRow').addEventListener('click', ()=>{
    rows += 1;
    renderBuilder();
  });
  document.getElementById('rmRow').addEventListener('click', ()=>{
    if(rows <= 1) return;
    rows -= 1;
    renderBuilder();
  });
  document.getElementById('addCol').addEventListener('click', ()=>{
    cols += 1;
    renderBuilder();
  });
  document.getElementById('rmCol').addEventListener('click', ()=>{
    if(cols <= 1) return;
    cols -= 1;
    renderBuilder();
  });
  document.getElementById('clearBtn').addEventListener('click', ()=>{
    header = header.map(()=> '');
    data = data.map(r=>r.map(()=> ''));
    renderBuilder();
  });

  const TEMPLATES = {
    comparison: {
      header: ['Feature','Free','Pro','Enterprise'],
      aligns: ['left','center','center','center'],
      data: [
        ['Projects','3','Unlimited','Unlimited'],
        ['Support','Community','Email','Dedicated'],
        ['SSO','No','No','Yes']
      ]
    },
    api: {
      header: ['Parameter','Type','Required','Description'],
      aligns: ['left','left','center','left'],
      data: [
        ['id','string','Yes','Unique identifier for the resource'],
        ['limit','integer','No','Max number of results to return'],
        ['cursor','string','No','Pagination cursor from a previous call']
      ]
    },
    features: {
      header: ['Feature','Description','Status'],
      aligns: ['left','left','center'],
      data: [
        ['Dark mode','System-aware theme switching','Shipped'],
        ['Offline sync','Queue changes without a connection','In progress'],
        ['Bulk export','Export records as CSV or JSON','Planned']
      ]
    },
    changelog: {
      header: ['Version','Date','Changes'],
      aligns: ['left','left','left'],
      data: [
        ['2.3.0','2026-06-14','Added dark mode and offline sync'],
        ['2.2.1','2026-05-02','Fixed pagination cursor bug'],
        ['2.2.0','2026-04-18','Introduced bulk export']
      ]
    }
  };

  document.getElementById('templateSelect').addEventListener('change', (e)=>{
    const t = TEMPLATES[e.target.value];
    if(!t) return;
    header = [...t.header];
    aligns = [...t.aligns];
    data = t.data.map(r => [...r]);
    cols = header.length;
    rows = data.length;
    renderBuilder();
    e.target.value = '';
  });

  // ---- tabs ----
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      mdOutput.style.display = tab === 'md' ? 'block' : 'none';
      previewOutput.style.display = tab === 'preview' ? 'block' : 'none';
    });
  });

  // ---- copy ----
  const copyBtn = document.getElementById('copyBtn');
  const copyLabel = document.getElementById('copyLabel');
  const toast = document.getElementById('toast');
  copyBtn.addEventListener('click', async ()=>{
    const md = buildMarkdown();
    try{
      await navigator.clipboard.writeText(md);
    } catch(e){
      const ta = document.createElement('textarea');
      ta.value = md;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    copyLabel.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    toast.classList.add('show');
    setTimeout(()=>{
      copyLabel.textContent = 'Copy';
      copyBtn.classList.remove('copied');
      toast.classList.remove('show');
    }, 1400);
  });

  renderBuilder();
})();
</script>
</body>
</html>
