<!--
HTML Entity Converter
Single-file client-side tool to encode text into HTML entities (named,
decimal, or hex) and decode entities back into readable text.
Built for One File Tools.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Entity Converter - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #2dd4bf;
        --accent-hover: #14b8a6;
        --accent-glow: rgba(45, 212, 191, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 20px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
        --color-weak: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 920px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 600px;
        margin: 0 auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .mode-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 18px;
      }

      .mode-tab {
        flex: 1;
        background: rgba(31, 41, 55, 0.5);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        border-radius: 8px;
        padding: 10px 14px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .mode-tab.active {
        background: var(--accent);
        color: #030712;
        border-color: var(--accent);
      }

      .mode-tab:hover:not(.active) {
        background: rgba(55, 65, 81, 0.7);
      }

      .mode-tab:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .encode-options {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 16px;
        align-items: center;
      }

      .encode-options .option-group {
        display: flex;
        gap: 6px;
      }

      .encode-options label.radio-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        color: var(--text-muted);
        cursor: pointer;
      }

      .encode-options input[type="radio"] {
        accent-color: var(--accent);
      }

      .encode-options input:checked ~ span,
      .radio-chip:has(input:checked) {
        color: var(--text);
      }

      .checkbox-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        color: var(--text-muted);
        cursor: pointer;
      }

      .split-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .field label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 8px;
      }

      textarea {
        width: 100%;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 14px;
        padding: 12px 14px;
        resize: vertical;
        min-height: 220px;
        line-height: 1.6;
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      textarea[readonly] {
        background: rgba(3, 7, 18, 0.5);
        color: var(--accent);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .btn-ghost {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-ghost:hover {
        background: rgba(55, 65, 81, 0.8);
      }

      .btn-ghost:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
      }

      .footer-note a {
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 22px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .studio {
          padding: 18px;
        }
        .split-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Text & Content</div>
        <h1 class="wordmark">HTML Entity Converter</h1>
        <p class="tagline">Encode text into HTML entities, or decode entities back into readable text — instantly, offline.</p>
      </header>

      <main class="studio">
        <div class="mode-tabs" role="tablist">
          <button class="mode-tab active" id="tabEncode" type="button" role="tab" aria-selected="true">Encode</button>
          <button class="mode-tab" id="tabDecode" type="button" role="tab" aria-selected="false">Decode</button>
        </div>

        <div class="encode-options" id="encodeOptions">
          <div class="option-group">
            <label class="radio-chip"><input type="radio" name="entityFormat" value="named" checked /> <span>Named</span></label>
            <label class="radio-chip"><input type="radio" name="entityFormat" value="decimal" /> <span>Decimal</span></label>
            <label class="radio-chip"><input type="radio" name="entityFormat" value="hex" /> <span>Hexadecimal</span></label>
          </div>
          <label class="checkbox-chip">
            <input type="checkbox" id="skipAscii" checked />
            <span>Preserve safe ASCII letters/digits</span>
          </label>
        </div>

        <div class="split-grid">
          <div class="field">
            <label for="inputText" id="inputLabel">Plain text</label>
            <textarea id="inputText" spellcheck="false" placeholder="Type or paste text…">Café & Co. <em>“quotes”</em> © 2026</textarea>
          </div>
          <div class="field">
            <label for="outputText" id="outputLabel">HTML entities</label>
            <textarea id="outputText" spellcheck="false" readonly></textarea>
          </div>
        </div>

        <div class="actions">
          <button class="btn-ghost" id="btnCopy" type="button">Copy output</button>
          <button class="btn-ghost" id="btnSwap" type="button">⇄ Use output as input</button>
          <button class="btn-ghost" id="btnClear" type="button">Clear</button>
        </div>
      </main>

      <p class="footer-note">Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a>. Runs completely offline.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      /* ==========================================================
         HTML Entity Converter
         Vanilla JS, no dependencies. Encoding uses a curated named-
         entity table for common characters (falls back to numeric
         for anything not in the table); decoding uses the browser's
         own HTML parser via a <textarea>, so it understands every
         named entity the browser does.
         ========================================================== */

      const tabEncode = document.getElementById("tabEncode");
      const tabDecode = document.getElementById("tabDecode");
      const encodeOptions = document.getElementById("encodeOptions");
      const inputText = document.getElementById("inputText");
      const outputText = document.getElementById("outputText");
      const inputLabel = document.getElementById("inputLabel");
      const outputLabel = document.getElementById("outputLabel");
      const skipAscii = document.getElementById("skipAscii");
      const btnCopy = document.getElementById("btnCopy");
      const btnSwap = document.getElementById("btnSwap");
      const btnClear = document.getElementById("btnClear");
      const toast = document.getElementById("toast");

      let mode = "encode"; // "encode" | "decode"

      // Curated named-entity table for common special characters. Anything not
      // listed here falls back to the numeric form even in "Named" mode, since
      // covering the full HTML5 named-entity list (2000+ names) isn't
      // necessary for the common case this tool targets.
      const NAMED_ENTITIES = {
        "&": "amp",
        "<": "lt",
        ">": "gt",
        '"': "quot",
        "'": "apos",
        "\u00a0": "nbsp",
        "\u00a9": "copy",
        "\u00ae": "reg",
        "\u2122": "trade",
        "\u20ac": "euro",
        "\u00a3": "pound",
        "\u00a5": "yen",
        "\u00a2": "cent",
        "\u00b0": "deg",
        "\u00b1": "plusmn",
        "\u00d7": "times",
        "\u00f7": "divide",
        "\u2013": "ndash",
        "\u2014": "mdash",
        "\u2018": "lsquo",
        "\u2019": "rsquo",
        "\u201c": "ldquo",
        "\u201d": "rdquo",
        "\u2026": "hellip",
        "\u2022": "bull",
        "\u00e9": "eacute",
        "\u00e8": "egrave",
        "\u00e0": "agrave",
        "\u00e7": "ccedil",
        "\u00fc": "uuml",
        "\u00f1": "ntilde",
        "\u00bd": "frac12",
        "\u00bc": "frac14",
        "\u00be": "frac34",
        "\u2190": "larr",
        "\u2192": "rarr",
        "\u2191": "uarr",
        "\u2193": "darr",
        "\u2764": "hearts",
        "\u221e": "infin"
      };

      /** Returns true when a character is a "safe" printable ASCII letter/digit/space. */
      function isSafeAscii(char) {
        const code = char.codePointAt(0);
        return code >= 0x20 && code <= 0x7e && !/[&<>"']/.test(char);
      }

      /** Encodes a single character per the selected format and options. */
      function encodeChar(char, format, preserveSafe) {
        if (preserveSafe && isSafeAscii(char)) return char;

        const codePoint = char.codePointAt(0);

        if (format === "named" && NAMED_ENTITIES[char]) {
          return "&" + NAMED_ENTITIES[char] + ";";
        }
        if (format === "hex") {
          return "&#x" + codePoint.toString(16).toUpperCase() + ";";
        }
        // "decimal" or named-without-a-table-entry fallback.
        return "&#" + codePoint + ";";
      }

      /** Encodes the full input string, iterating by Unicode code point. */
      function encodeText(text, format, preserveSafe) {
        return Array.from(text)
          .map((char) => encodeChar(char, format, preserveSafe))
          .join("");
      }

      /**
       * Decodes HTML entities using the browser's own HTML parser: setting
       * innerHTML on a detached element and reading textContent back handles
       * every named, decimal, and hex entity the browser itself supports,
       * without needing a hand-maintained entity table.
       */
      function decodeText(text) {
        const el = document.createElement("textarea");
        el.innerHTML = text;
        return el.value;
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      function currentFormat() {
        const checked = document.querySelector('input[name="entityFormat"]:checked');
        return checked ? checked.value : "named";
      }

      /** Recomputes and renders the output based on current mode/options. */
      function render() {
        if (mode === "encode") {
          outputText.value = encodeText(inputText.value, currentFormat(), skipAscii.checked);
        } else {
          outputText.value = decodeText(inputText.value);
        }
      }

      function setMode(nextMode) {
        mode = nextMode;
        const isEncode = mode === "encode";
        tabEncode.classList.toggle("active", isEncode);
        tabDecode.classList.toggle("active", !isEncode);
        tabEncode.setAttribute("aria-selected", String(isEncode));
        tabDecode.setAttribute("aria-selected", String(!isEncode));
        encodeOptions.style.display = isEncode ? "flex" : "none";
        inputLabel.textContent = isEncode ? "Plain text" : "HTML entities";
        outputLabel.textContent = isEncode ? "HTML entities" : "Plain text";
        render();
      }

      tabEncode.addEventListener("click", () => setMode("encode"));
      tabDecode.addEventListener("click", () => setMode("decode"));

      inputText.addEventListener("input", render);
      skipAscii.addEventListener("change", render);
      document.querySelectorAll('input[name="entityFormat"]').forEach((radio) => {
        radio.addEventListener("change", render);
      });

      btnCopy.addEventListener("click", () => {
        const text = outputText.value;
        if (!text) {
          showToast("Nothing to copy yet");
          return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(() => showToast("Copied!"))
            .catch(() => showToast("Copy failed — select the text manually"));
        } else {
          showToast("Clipboard unavailable");
        }
      });

      btnSwap.addEventListener("click", () => {
        if (!outputText.value) return;
        inputText.value = outputText.value;
        render();
      });

      btnClear.addEventListener("click", () => {
        inputText.value = "";
        outputText.value = "";
        inputText.focus();
      });

      render();
    </script>
  </body>
</html>
