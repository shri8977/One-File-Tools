<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e1a;
        --surface: #111827;
        --surface2: #161d2e;
        --surface3: #1e2a3e;
        --border: #1f2d45;
        --border2: #263650;
        --text: #e8edf5;
        --text-muted: #5a7399;
        --text-dim: #3a5278;
        --violet: #7c5cfc;
        --violet-dim: #3d2d8a;
        --violet-glow: #7c5cfc30;
        --cyan: #00d4c8;
        --cyan-dim: #004d48;
        --cyan-glow: #00d4c820;
        --pink: #f059da;
        --pink-dim: #5a1f50;
        --green: #39e58c;
        --amber: #f5a623;
        --radius: 6px;
        --radius-lg: 10px;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
      }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 36px 20px 60px;
        line-height: 1.5;
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 32px;
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      header h1 {
        font-family: var(--mono);
        font-size: 20px;
        font-weight: 600;
        color: var(--cyan);
        letter-spacing: -0.5px;
      }
      header h1 span {
        color: var(--violet);
      }
      .version {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-dim);
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 4px;
      }

      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 680px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .panel-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-head-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--violet);
      }
      .panel-label {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .panel-body {
        padding: 16px;
      }

      .ctrl {
        margin-bottom: 16px;
      }
      .ctrl:last-child {
        margin-bottom: 0;
      }

      .ctrl-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .ctrl-name {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.05em;
      }
      .ctrl-val {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--cyan);
        background: var(--cyan-glow);
        border: 1px solid var(--cyan-dim);
        padding: 1px 7px;
        border-radius: 4px;
        min-width: 44px;
        text-align: center;
      }

      input[type="range"] {
        width: 100%;
        appearance: none;
        height: 3px;
        background: var(--border2);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--cyan);
        cursor: pointer;
        border: 2px solid var(--bg);
        box-shadow: 0 0 0 1px var(--cyan);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--cyan);
        cursor: pointer;
        border: 2px solid var(--bg);
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }

      .sizing-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sizing-opt {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: var(--radius);
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.12s;
      }
      .sizing-opt:hover {
        background: var(--surface3);
        border-color: var(--border);
      }
      .sizing-opt.active {
        background: var(--violet-glow);
        border-color: var(--violet-dim);
      }
      .sizing-opt input[type="radio"] {
        display: none;
      }
      .sizing-radio {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid var(--border2);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s;
      }
      .sizing-opt.active .sizing-radio {
        border-color: var(--violet);
        background: var(--violet);
        box-shadow: 0 0 6px var(--violet-glow);
      }
      .sizing-radio::after {
        content: "";
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: white;
        opacity: 0;
        transition: opacity 0.12s;
      }
      .sizing-opt.active .sizing-radio::after {
        opacity: 1;
      }
      .sizing-name {
        font-size: 12px;
        color: var(--text);
        flex: 1;
      }
      .sizing-opt.active .sizing-name {
        color: var(--text);
      }
      .sizing-code {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        background: var(--surface3);
        padding: 1px 5px;
        border-radius: 3px;
      }
      .sizing-opt.active .sizing-code {
        color: var(--violet);
        background: var(--violet-glow);
      }

      .right-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .preview-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .preview-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .preview-dots {
        display: flex;
        gap: 5px;
      }
      .preview-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .dot-r {
        background: #e24b4b;
      }
      .dot-y {
        background: #e2a24b;
      }
      .dot-g {
        background: #4be26c;
      }
      .preview-meta {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
      }
      .preview-meta span {
        color: var(--cyan);
      }

      #preview {
        padding: 16px;
        min-height: 180px;
        background: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 24px 24px;
        background-color: var(--bg);
        transition: gap 0.15s;
      }

      .grid-item {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        color: var(--text-dim);
        min-height: 48px;
        transition: all 0.15s;
        position: relative;
        overflow: hidden;
      }
      .grid-item::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--violet-glow);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .grid-item:hover::before {
        opacity: 1;
      }
      .grid-item:hover {
        border-color: var(--violet-dim);
        color: var(--violet);
      }

      .css-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .css-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .css-fname {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-muted);
      }
      .css-lang {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        background: var(--surface3);
        padding: 1px 6px;
        border-radius: 3px;
      }

      #css-out {
        font-family: var(--mono);
        font-size: 12.5px;
        line-height: 1.9;
        padding: 16px 20px;
        color: var(--text);
        white-space: pre;
        overflow-x: auto;
        background: var(--bg);
      }

      .tok-sel {
        color: #f059da;
      }
      .tok-brace {
        color: #5a7399;
      }
      .tok-prop {
        color: #00d4c8;
      }
      .tok-colon {
        color: #5a7399;
      }
      .tok-fn {
        color: #7c5cfc;
      }
      .tok-num {
        color: #f5a623;
      }
      .tok-unit {
        color: #39e58c;
      }
      .tok-kw {
        color: #f059da;
      }
      .tok-semi {
        color: #5a7399;
      }

      .btn-row {
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface2);
      }

      button {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.12s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border2);
        background: var(--surface3);
        color: var(--text-muted);
      }
      button:hover {
        border-color: var(--border2);
        color: var(--text);
        background: var(--surface2);
      }
      button:active {
        transform: scale(0.97);
      }

      button.primary {
        background: var(--violet);
        border-color: var(--violet);
        color: #fff;
      }
      button.primary:hover {
        background: #8f6dff;
        border-color: #8f6dff;
        color: #fff;
      }
      button.success {
        background: var(--cyan-dim);
        border-color: var(--cyan);
        color: var(--cyan);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1><span>//</span> css-grid<span>.</span>gen</h1>
        <span class="version">v2.0</span>
      </header>

      <div class="layout">
        <div class="panel">
          <div class="panel-head">
            <div class="panel-head-dot"></div>
            <span class="panel-label">config</span>
          </div>
          <div class="panel-body">
            <div class="ctrl">
              <div class="ctrl-top">
                <span class="ctrl-name">columns</span>
                <span class="ctrl-val" id="cols-val">4</span>
              </div>
              <input type="range" id="cols" min="1" max="12" value="4" step="1" />
            </div>

            <div class="ctrl">
              <div class="ctrl-top">
                <span class="ctrl-name">rows</span>
                <span class="ctrl-val" id="rows-val">3</span>
              </div>
              <input type="range" id="rows" min="1" max="8" value="3" step="1" />
            </div>

            <div class="ctrl">
              <div class="ctrl-top">
                <span class="ctrl-name">gap</span>
                <span class="ctrl-val" id="gap-val">16px</span>
              </div>
              <input type="range" id="gap" min="0" max="64" value="16" step="2" />
            </div>

            <div class="divider"></div>

            <div style="margin-bottom: 10px">
              <div class="ctrl-name" style="margin-bottom: 8px">column sizing</div>
              <div class="sizing-group" id="col-group">
                <label class="sizing-opt active"
                  ><input type="radio" name="colsize" value="1fr" checked />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Equal</span><span class="sizing-code">1fr</span></label
                >
                <label class="sizing-opt"
                  ><input type="radio" name="colsize" value="auto" />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Auto</span><span class="sizing-code">auto</span></label
                >
                <label class="sizing-opt"
                  ><input type="radio" name="colsize" value="minmax(80px,1fr)" />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Responsive</span><span class="sizing-code">minmax</span></label
                >
                <label class="sizing-opt"
                  ><input type="radio" name="colsize" value="max-content" />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Max content</span><span class="sizing-code">max-c</span></label
                >
              </div>
            </div>

            <div class="divider"></div>

            <div>
              <div class="ctrl-name" style="margin-bottom: 8px">row sizing</div>
              <div class="sizing-group" id="row-group">
                <label class="sizing-opt active"
                  ><input type="radio" name="rowsize" value="1fr" checked />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Equal</span><span class="sizing-code">1fr</span></label
                >
                <label class="sizing-opt"
                  ><input type="radio" name="rowsize" value="auto" />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Auto</span><span class="sizing-code">auto</span></label
                >
                <label class="sizing-opt"
                  ><input type="radio" name="rowsize" value="minmax(60px,1fr)" />
                  <div class="sizing-radio"></div>
                  <span class="sizing-name">Min 60px</span><span class="sizing-code">minmax</span></label
                >
              </div>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div class="preview-panel">
            <div class="preview-head">
              <div class="preview-dots">
                <span class="dot-r"></span>
                <span class="dot-y"></span>
                <span class="dot-g"></span>
              </div>
              <span class="panel-label">live preview</span>
              <span class="preview-meta" id="grid-meta"><span>4</span>×<span>3</span> — <span>12</span> cells</span>
            </div>
            <div id="preview"></div>
          </div>

          <div class="css-panel">
            <div class="css-head">
              <span class="css-fname">styles.css</span>
              <span class="panel-label">generated css</span>
              <span class="css-lang">CSS</span>
            </div>
            <pre id="css-out"></pre>
            <div class="btn-row">
              <button class="primary" id="copy-btn" onclick="copyCss()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                copy css
              </button>
              <button onclick="resetAll()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                  <path d="M3 3v5h5" />
                </svg>
                reset
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const colsEl = document.getElementById("cols"),
        rowsEl = document.getElementById("rows"),
        gapEl = document.getElementById("gap");
      const colsVal = document.getElementById("cols-val"),
        rowsVal = document.getElementById("rows-val"),
        gapVal = document.getElementById("gap-val");
      const preview = document.getElementById("preview"),
        cssOut = document.getElementById("css-out"),
        copyBtn = document.getElementById("copy-btn");
      const gridMeta = document.getElementById("grid-meta");

      function getColSize() {
        return document.querySelector('input[name="colsize"]:checked').value;
      }
      function getRowSize() {
        return document.querySelector('input[name="rowsize"]:checked').value;
      }

      function tokenize(c, r, g, cs, rs) {
        const colVal = "repeat(" + c + ", " + cs + ")";
        const rowVal = "repeat(" + r + ", " + rs + ")";
        const gapPx = g + "px";
        function num(v) {
          return '<span class="tok-num">' + v + "</span>";
        }
        function unit(v) {
          return '<span class="tok-unit">' + v + "</span>";
        }
        function fn(name, args) {
          const parts = args.split(",");
          const inner = parts
            .map((p) => {
              p = p.trim();
              const nm = /^(\d+)(fr|px)?$/.exec(p);
              if (nm) return nm[2] ? num(nm[1]) + unit(nm[2]) : num(nm[1]);
              if (p === "auto" || p === "max-content" || p === "min-content") return '<span class="tok-kw">' + p + "</span>";
              if (p.startsWith("minmax")) {
                const inner2 = p.slice(7, -1).split(",");
                return (
                  '<span class="tok-fn">minmax</span><span class="tok-brace">(</span>' +
                  inner2
                    .map((x) => {
                      x = x.trim();
                      const m = /^(\d+)(px|fr)$/.exec(x);
                      return m ? num(m[1]) + unit(m[2]) : '<span class="tok-kw">' + x + "</span>";
                    })
                    .join('<span class="tok-colon">, </span>') +
                  '<span class="tok-brace">)</span>'
                );
              }
              return p;
            })
            .join('<span class="tok-colon">, </span>');
          return '<span class="tok-fn">' + name + '</span><span class="tok-brace">(</span>' + inner + '<span class="tok-brace">)</span>';
        }
        function prop(name, val) {
          return '  <span class="tok-prop">' + name + '</span><span class="tok-colon">: </span>' + val + '<span class="tok-semi">;</span>\n';
        }
        let out = '<span class="tok-sel">.container</span> <span class="tok-brace">{</span>\n';
        out += prop("display", '<span class="tok-kw">grid</span>');
        out += prop("grid-template-columns", fn("repeat", c + ", " + cs));
        out += prop("grid-template-rows", fn("repeat", r + ", " + rs));
        const gm = /^(\d+)(px)$/.exec(gapPx);
        out += prop("gap", gm ? num(gm[1]) + unit(gm[2]) : gapPx);
        out += '<span class="tok-brace">}</span>';
        return out;
      }

      function update() {
        const c = parseInt(colsEl.value),
          r = parseInt(rowsEl.value),
          g = parseInt(gapEl.value);
        const cs = getColSize(),
          rs = getRowSize();
        colsVal.textContent = c;
        rowsVal.textContent = r;
        gapVal.textContent = g + "px";
        gridMeta.innerHTML = "<span>" + c + "</span>\xd7<span>" + r + "</span> \u2014 <span>" + c * r + "</span> cells";
        preview.style.display = "grid";
        preview.style.gridTemplateColumns = "repeat(" + c + ", " + cs + ")";
        preview.style.gridTemplateRows = "repeat(" + r + ", " + rs + ")";
        preview.style.gap = g + "px";
        preview.innerHTML = "";
        for (let i = 1; i <= c * r; i++) {
          const d = document.createElement("div");
          d.className = "grid-item";
          d.textContent = String(i).padStart(2, "0");
          preview.appendChild(d);
        }
        cssOut.innerHTML = tokenize(c, r, g, cs, rs);
        cssOut._raw = ".container {\n  display: grid;\n  grid-template-columns: repeat(" + c + ", " + cs + ");\n  grid-template-rows: repeat(" + r + ", " + rs + ");\n  gap: " + g + "px;\n}";
      }

      function syncRadio() {
        document.querySelectorAll(".sizing-opt").forEach((l) => {
          l.classList.toggle("active", l.querySelector("input").checked);
        });
      }

      function copyCss() {
        navigator.clipboard.writeText(cssOut._raw || cssOut.textContent).then(() => {
          copyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> copied!';
          copyBtn.classList.remove("primary");
          copyBtn.classList.add("success");
          setTimeout(() => {
            copyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/></svg> copy css';
            copyBtn.classList.remove("success");
            copyBtn.classList.add("primary");
          }, 2000);
        });
      }

      function resetAll() {
        colsEl.value = 4;
        rowsEl.value = 3;
        gapEl.value = 16;
        document.querySelector('input[name="colsize"][value="1fr"]').checked = true;
        document.querySelector('input[name="rowsize"][value="1fr"]').checked = true;
        syncRadio();
        update();
      }

      [colsEl, rowsEl, gapEl].forEach((el) => el.addEventListener("input", update));
      document.querySelectorAll('input[name="colsize"],input[name="rowsize"]').forEach((el) => {
        el.addEventListener("change", () => {
          syncRadio();
          update();
        });
      });
      document.querySelectorAll(".sizing-opt").forEach((l) => {
        l.addEventListener("click", () => {
          const inp = l.querySelector("input");
          inp.checked = true;
          syncRadio();
          update();
        });
      });
      update();
    </script>
  </body>
</html>
