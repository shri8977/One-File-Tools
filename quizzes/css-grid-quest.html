<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learn CSS Grid through interactive challenges." />
  <title>CSS Grid Quest — One File Tools</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fafafa;--surface:#f1f5f9;--text:#1a1a1a;--muted:#64748b;--border:#e2e8f0;--accent:#2563eb;--success:#16a34a;--error:#dc2626;--warning:#d97706;--radius:8px}
    @media(prefers-color-scheme:dark){:root{--bg:#0a0a0a;--surface:#1a1a1a;--text:#e5e5e5;--muted:#94a3b8;--border:#334155;--accent:#3b82f6}}
    body{font-family:system-ui,sans-serif;line-height:1.6;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:1000px;margin:0 auto;padding:1.5rem}
    header{text-align:center;margin-bottom:1.5rem}
    header h1{font-size:1.75rem;margin-bottom:0.25rem}
    header p{color:var(--muted);font-size:0.9rem}
    .progress{background:var(--border);height:6px;border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
    .progress-fill{background:var(--accent);height:100%;transition:width 0.3s}
    .level-badge{display:inline-block;background:var(--accent);color:white;padding:0.2rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:600}
    .level-title{font-size:1.25rem;font-weight:600;margin:0.75rem 0 0.5rem}
    .level-desc{color:var(--muted);margin-bottom:1rem;font-size:0.9rem}
    .grid-area{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:1rem;min-height:200px;margin-bottom:1rem}
    .grid-container{display:grid;gap:8px;min-height:160px;background:#f0f0f0;padding:8px;border-radius:4px}
    @media(prefers-color-scheme:dark){.grid-container{background:#2a2a2a}}
    .grid-item{background:var(--accent);color:white;padding:0.75rem;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:600;min-width:40px;min-height:40px}
    .grid-item:nth-child(2){background:var(--success)}
    .grid-item:nth-child(3){background:var(--warning)}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
    .control-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem}
    .control-label{width:100%;font-size:0.75rem;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:0.25rem}
    .control-btn{padding:0.4rem 0.75rem;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);cursor:pointer;font-size:0.8rem;transition:all 0.2s}
    .control-btn:hover{border-color:var(--accent)}
    .control-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
    .code-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;font-family:monospace;font-size:0.85rem;margin-bottom:1rem;color:var(--text)}
    .btn{width:100%;padding:0.875rem;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer}
    .btn:hover{opacity:0.9}
    .feedback{padding:1rem;border-radius:var(--radius);margin-bottom:1rem;display:none;color:var(--text)}
    .feedback.show{display:block}
    .feedback.success{background:rgba(22,163,74,0.1);border:1px solid var(--success)}
    .feedback.error{background:rgba(220,38,38,0.1);border:1px solid var(--error)}
    .score-row{display:flex;justify-content:center;gap:2rem;padding-top:1rem;border-top:1px solid var(--border)}
    .score-item{text-align:center}
    .score-value{font-size:1.5rem;font-weight:700}
    .score-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
    footer{text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem}
    footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
  <div class="container">
    <header><h1>📐 CSS Grid Quest</h1><p>Master CSS Grid through interactive challenges</p></header>
    <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="level-badge" id="levelBadge">Level 1 of 6</div>
    <h2 class="level-title" id="levelTitle">Grid Basics</h2>
    <p class="level-desc" id="levelDesc">Create a simple 3-column grid</p>
    <div class="grid-area">
      <div class="grid-container" id="gridContainer">
        <div class="grid-item">1</div><div class="grid-item">2</div><div class="grid-item">3</div>
      </div>
    </div>
    <div class="controls">
      <div class="control-row"><div class="control-label">grid-template-columns</div></div>
      <div class="control-row" id="columnsBtns">
        <button class="control-btn active" data-value="1fr 1fr 1fr">1fr 1fr 1fr</button>
        <button class="control-btn" data-value="repeat(3, 1fr)">repeat(3, 1fr)</button>
        <button class="control-btn" data-value="2fr 1fr 1fr">2fr 1fr 1fr</button>
        <button class="control-btn" data-value="100px 100px 100px">100px 100px 100px</button>
      </div>
    </div>
    <div class="controls">
      <div class="control-row"><div class="control-label">gap</div></div>
      <div class="control-row" id="gapBtns">
        <button class="control-btn active" data-value="8px">8px</button>
        <button class="control-btn" data-value="16px">16px</button>
        <button class="control-btn" data-value="0px">0px</button>
        <button class="control-btn" data-value="24px">24px</button>
      </div>
    </div>
    <div class="code-preview" id="codePreview">
      <div><span style="color:var(--accent)">display:</span> grid;</div>
      <div id="columnsCode"><span style="color:var(--accent)">grid-template-columns:</span> 1fr 1fr 1fr;</div>
      <div id="gapCode"><span style="color:var(--accent)">gap:</span> 8px;</div>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="checkBtn">Check Answer</button>
    <div class="score-row">
      <div class="score-item"><div class="score-value" id="score">0</div><div class="score-label">Score</div></div>
      <div class="score-item"><div class="score-value" id="level">1</div><div class="score-label">Level</div></div>
    </div>
  </div>
  <footer><p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p></footer>
  <script>
    const levels=[
      {title:"Grid Basics",desc:"Create a simple 3-column grid",cols:"1fr 1fr 1fr",gap:"8px",hint:"Use three equal columns"},
      {title:"Column Sizes",desc:"Make first column twice as wide",cols:"2fr 1fr 1fr",gap:"8px",hint:"Use 2fr for the first column"},
      {title:"Gap Practice",desc:"Add 16px gap between items",cols:"1fr 1fr 1fr",gap:"16px",hint:"16px is medium spacing"},
      {title:"Repeat Function",desc:"Use repeat() for columns",cols:"repeat(3, 1fr)",gap:"8px",hint:"repeat(3, 1fr) = 1fr 1fr 1fr"},
      {title:"No Gap",desc:"Remove the gap completely",cols:"1fr 1fr 1fr",gap:"0px",hint:"gap: 0px"},
      {title:"Grand Finale",desc:"2fr columns with 24px gap",cols:"2fr 1fr 1fr",gap:"24px",hint:"Combine 2fr and large gap"}
    ];
    let state={level:0,score:0};
    const storage='css-grid-quest';
    function load(){try{const s=localStorage.getItem(storage);if(s)state=JSON.parse(s)}catch(e){}}
    function save(){try{localStorage.setItem(storage,JSON.stringify(state))}catch(e){}}
    function render(){
      if(state.completed){
        var fb=document.getElementById('feedback');
        fb.className='feedback show success';
        fb.innerHTML='🎉 Quiz Complete! Final score: '+state.score+'<br><button onclick="resetQuiz()" style="margin-top:12px;padding:8px 20px;border:none;border-radius:6px;background:var(--accent,#2563eb);color:#fff;cursor:pointer;font-weight:600">Play Again</button>';
        document.getElementById('checkBtn').disabled=true;
        return;
      }
      const l=levels[state.level];
      document.getElementById('levelBadge').textContent='Level '+(state.level+1)+' of '+levels.length;
      document.getElementById('levelTitle').textContent=l.title;
      document.getElementById('levelDesc').textContent=l.desc;
      document.getElementById('progress').style.width=((state.level/levels.length)*100)+'%';
      document.getElementById('score').textContent=state.score;
      document.getElementById('level').textContent=state.level+1;
      document.getElementById('feedback').className='feedback';
      document.getElementById('feedback').textContent='';
      updateCode();
    }
    function updateCode(){
      const colsBtn=document.querySelector('#columnsBtns .control-btn.active');
      const gapBtn=document.querySelector('#gapBtns .control-btn.active');
      const cols=colsBtn?colsBtn.dataset.value:'1fr 1fr 1fr';
      const gap=gapBtn?gapBtn.dataset.value:'8px';
      document.getElementById('columnsCode').innerHTML='<span style="color:var(--accent)">grid-template-columns:</span> '+cols+';';
      document.getElementById('gapCode').innerHTML='<span style="color:var(--accent)">gap:</span> '+gap+';';
      document.getElementById('gridContainer').style.gridTemplateColumns=cols;
      document.getElementById('gridContainer').style.gap=gap;
    }
    document.querySelectorAll('#columnsBtns .control-btn').forEach(function(btn){
      btn.onclick=function(){
        document.querySelectorAll('#columnsBtns .control-btn').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');updateCode();
      };
    });
    document.querySelectorAll('#gapBtns .control-btn').forEach(function(btn){
      btn.onclick=function(){
        document.querySelectorAll('#gapBtns .control-btn').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');updateCode();
      };
    });
    document.getElementById('checkBtn').onclick=function(){
      const l=levels[state.level];
      const colsBtn=document.querySelector('#columnsBtns .control-btn.active');
      const gapBtn=document.querySelector('#gapBtns .control-btn.active');
      const cols=colsBtn?colsBtn.dataset.value:'1fr 1fr 1fr';
      const gap=gapBtn?gapBtn.dataset.value:'8px';
      const correct=cols===l.cols&&gap===l.gap;
      const fb=document.getElementById('feedback');
      if(correct){
        state.score+=20;
        save();
        document.getElementById('score').textContent=state.score;
        if(state.level===levels.length-1){
          fb.className='feedback show success';
          fb.innerHTML='🎉 Quest Complete! Final score: '+state.score+'<br><button onclick="resetQuiz()" style="margin-top:12px;padding:8px 20px;border:none;border-radius:6px;background:var(--accent,#2563eb);color:#fff;cursor:pointer;font-weight:600">Play Again</button>';
          state.completed=true;
          save();
        }else{
          fb.className='feedback show success';
          fb.textContent='Correct! Next level...';
          state.level++;
          save();
          setTimeout(render,1500);
        }
      }else{
        fb.className='feedback show error';
        fb.textContent='Try again! Hint: '+l.hint;
      }
    };
    function resetQuiz(){
      state={level:0,score:0};
      save();
      document.querySelectorAll('.control-btn').forEach(function(b){b.classList.remove('active')});
      render();
      updateCode();
    }
    load();render();updateCode();
  </script>
</body>
</html>
