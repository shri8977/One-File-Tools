<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learn JavaScript Event Loop through interactive challenges." />
  <title>Event Loop Arena — One File Tools</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fafafa;--surface:#f1f5f9;--text:#1a1a1a;--muted:#64748b;--border:#e2e8f0;--accent:#2563eb;--success:#16a34a;--error:#dc2626;--warning:#d97706;--radius:8px}
    @media(prefers-color-scheme:dark){:root{--bg:#0a0a0a;--surface:#1a1a1a;--text:#e5e5e5;--muted:#94a3b8;--border:#334155;--accent:#3b82f6}}
    body{font-family:system-ui,sans-serif;line-height:1.6;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:900px;margin:0 auto;padding:1.5rem}
    header{text-align:center;margin-bottom:1.5rem}
    header h1{font-size:1.75rem;margin-bottom:0.25rem}
    header p{color:var(--muted);font-size:0.9rem}
    .progress{background:var(--border);height:8px;border-radius:4px;margin-bottom:1.5rem;overflow:hidden}
    .progress-fill{background:var(--accent);height:100%;transition:width 0.3s}
    .level-badge{display:inline-block;background:var(--accent);color:white;padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:600}
    .level-title{font-size:1.25rem;font-weight:600;margin:0.75rem 0 0.5rem}
    .level-desc{color:var(--muted);margin-bottom:1rem;font-size:0.9rem}
    .concept-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;font-size:0.9rem;color:var(--text)}
    .code-box{background:#1e1e1e;color:#d4d4d4;border-radius:var(--radius);padding:1rem;margin-bottom:1rem;font-family:'Consolas','Monaco',monospace;font-size:0.85rem;overflow-x:auto;white-space:pre;line-height:1.6}
    .choices{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem}
    .choice{ padding:1rem;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;text-align:left;font-family:monospace;font-size:0.9rem;transition:all 0.2s}
    .choice:hover{border-color:var(--accent)}
    .choice.selected{border-color:var(--accent);background:rgba(37,99,235,0.1)}
    .choice.correct{border-color:var(--success);background:rgba(22,163,74,0.1)}
    .choice.wrong{border-color:var(--error);background:rgba(220,38,38,0.1)}
    .btn{width:100%;padding:0.875rem;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .feedback{padding:1rem;border-radius:var(--radius);margin-bottom:1rem;display:none;color:var(--text)}
    .feedback.show{display:block}
    .feedback.success{background:rgba(22,163,74,0.1);border:1px solid var(--success)}
    .feedback.error{background:rgba(220,38,38,0.1);border:1px solid var(--error)}
    .score-row{display:flex;justify-content:center;gap:2rem;padding-top:1rem;border-top:1px solid var(--border);margin-top:1rem}
    .score-item{text-align:center}
    .score-value{font-size:1.5rem;font-weight:700}
    .score-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
    footer{text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem}
    footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
  <div class="container">
    <header><h1>🎮 Event Loop Arena</h1><p>Master JavaScript's async execution order</p></header>

    <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div class="level-badge" id="levelBadge">Level 1 of 10</div>
    <h2 class="level-title" id="levelTitle">Sync Basics</h2>
    <p class="level-desc" id="levelDesc">What order will these logs appear?</p>

    <div class="concept-box" id="conceptBox">
      <strong>Concept:</strong> <span id="conceptText">Synchronous code runs line by line, top to bottom.</span>
    </div>

    <div class="code-box" id="codeBox">console.log('A');
console.log('B');
console.log('C');</div>

    <div class="choices" id="choices"></div>

    <button class="btn" id="checkBtn" disabled>Check Answer</button>

    <div class="feedback" id="feedback"></div>

    <div class="score-row">
      <div class="score-item"><div class="score-value" id="score">0</div><div class="score-label">Score</div></div>
      <div class="score-item"><div class="score-value" id="level">1</div><div class="score-label">Level</div></div>
      <div class="score-item"><div class="score-value" id="stars">0</div><div class="score-label">Stars</div></div>
    </div>
  </div>

  <footer><p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p></footer>

  <script>
    var levels=[
      {title:"Sync Basics",desc:"What order will these logs appear?",concept:"Synchronous code runs line by line, from top to bottom.",code:"console.log('A');\nconsole.log('B');\nconsole.log('C');",choices:["A, B, C","A, C, B","C, B, A"],answer:0},
      {title:"Variables First",desc:"What gets logged?",concept:"Variables are set immediately when their line runs.",code:"let x = 1;\nconsole.log(x);\nx = 2;\nconsole.log(x);",choices:["1, 2","2, 2","1, 1"],answer:0},
      {title:"setTimeout Intro",desc:"Now with async - what's the order?",concept:"setTimeout is async. It waits, then runs callback in queue.",code:"console.log('1');\nsetTimeout(() => console.log('2'), 0);\nconsole.log('3');",choices:["1, 2, 3","1, 3, 2","3, 1, 2"],answer:1},
      {title:"Timeout Delay",desc:"What order with delays?",concept:"Callbacks wait in the queue until the call stack is empty.",code:"console.log('A');\nsetTimeout(() => console.log('B'), 100);\nsetTimeout(() => console.log('C'), 0);\nconsole.log('D');",choices:["A, B, C, D","A, D, C, B","A, D, B, C"],answer:1},
      {title:"Promise Intro",desc:"How about Promises?",concept:"Promise callbacks go to the microtask queue (higher priority than setTimeout).",code:"console.log('1');\nPromise.resolve().then(() => console.log('2'));\nconsole.log('3');",choices:["1, 2, 3","1, 3, 2","3, 2, 1"],answer:1},
      {title:"Promise vs Timeout",desc:"Microtasks vs Macrotasks",concept:"Microtasks (Promises) run BEFORE macrotasks (setTimeout).",code:"console.log('start');\nsetTimeout(() => console.log('timeout'), 0);\nPromise.resolve().then(() => console.log('promise'));\nconsole.log('end');",choices:["start, timeout, promise, end","start, end, timeout, promise","start, end, promise, timeout"],answer:2},
      {title:"Promise Chain",desc:"Chained promises",concept:"Each .then() creates a new microtask.",code:"Promise.resolve(1)\n  .then(x => { console.log(x); return x+1; })\n  .then(x => console.log(x));",choices:["1, 2","2, 1","1 only"],answer:0},
      {title:"Nested Promises",desc:"Deep promise chains",concept:"Each step in the chain waits for the previous to complete.",code:"console.log('1');\nPromise.resolve()\n  .then(() => console.log('2'))\n  .then(() => Promise.resolve())\n  .then(() => console.log('3'));\nconsole.log('4');",choices:["1, 2, 3, 4","1, 4, 2, 3","1, 4, 3, 2"],answer:1},
      {title:"async/await",desc:"Async functions are promises",concept:"await pauses the async function, but doesn't block main thread.",code:"async function test() {\n  console.log('A');\n  await Promise.resolve();\n  console.log('B');\n}\ntest();\nconsole.log('C');",choices:["A, B, C","A, C, B","C, A, B"],answer:1},
      {title:"Final Challenge",desc:"Master level!",concept:"Mix setTimeout, Promises, and async/await.",code:"async function main() {\n  console.log('1');\n  setTimeout(() => console.log('2'), 0);\n  await Promise.resolve();\n  console.log('3');\n}\nmain();\nPromise.resolve().then(() => console.log('4'));\nconsole.log('5');",choices:["1, 5, 3, 4, 2","1, 5, 4, 3, 2","1, 3, 5, 2, 4"],answer:0}
    ];

    var state={level:0,score:0,stars:0,mistakes:0};
    var storage='event-loop-quest';
    var selectedChoice=null;

    function load(){try{var s=localStorage.getItem(storage);if(s)state=JSON.parse(s)}catch(e){}}
    function save(){try{localStorage.setItem(storage,JSON.stringify(state))}catch(e){}}

    function render(){
      if(state.completed){
        var fb=document.getElementById('feedback');
        fb.className='feedback show success';
        fb.innerHTML='🎉 Quiz Complete! Final score: '+state.score+' | Stars: '+Math.max(0,state.stars)+'<br><button onclick="resetQuiz()" style="margin-top:12px;padding:8px 20px;border:none;border-radius:6px;background:var(--accent,#2563eb);color:#fff;cursor:pointer;font-weight:600">Play Again</button>';
        document.getElementById('checkBtn').disabled=true;
        return;
      }
      var l=levels[state.level];
      document.getElementById('levelBadge').textContent='Level '+(state.level+1)+' of '+levels.length;
      document.getElementById('levelTitle').textContent=l.title;
      document.getElementById('levelDesc').textContent=l.desc;
      document.getElementById('conceptText').textContent=l.concept;
      document.getElementById('codeBox').textContent=l.code;
      document.getElementById('progress').style.width=((state.level/levels.length)*100)+'%';
      document.getElementById('score').textContent=state.score;
      document.getElementById('level').textContent=state.level+1;
      document.getElementById('stars').textContent=state.stars;

      var choicesEl=document.getElementById('choices');
      choicesEl.innerHTML=l.choices.map(function(c,i){
        return'<div class="choice" data-index="'+i+'">Output '+String.fromCharCode(65+i)+': '+c+'</div>';
      }).join('');

      choicesEl.querySelectorAll('.choice').forEach(function(choice){
        choice.onclick=function(){
          choicesEl.querySelectorAll('.choice').forEach(function(c){c.classList.remove('selected')});
          choice.classList.add('selected');
          selectedChoice=parseInt(choice.dataset.index);
          document.getElementById('checkBtn').disabled=false;
        };
      });

      document.getElementById('checkBtn').disabled=true;
      document.getElementById('feedback').className='feedback';
      document.getElementById('feedback').textContent='';
      selectedChoice=null;
    }

    function advanceOrFinish(finalMessage){
      if(state.level>=levels.length-1){
        var fb=document.getElementById('feedback');
        fb.className='feedback show success';
        fb.innerHTML=finalMessage+' Final score: '+state.score+' | Stars: '+Math.max(0,state.stars)+'<br><button onclick="resetQuiz()" style="margin-top:12px;padding:8px 20px;border:none;border-radius:6px;background:var(--accent,#2563eb);color:#fff;cursor:pointer;font-weight:600">Play Again</button>';
        state.completed=true;
        save();
      }else{
        state.level++;
        save();
        setTimeout(render,2200);
      }
    }

    function resetQuiz(){
      state={level:0,score:0,stars:0,mistakes:0};
      save();
      selectedChoice=null;
      render();
    }

    document.getElementById('checkBtn').onclick=function(){
      var l=levels[state.level];
      var correct=selectedChoice===l.answer;
      var choices=document.querySelectorAll('.choice');

      choices.forEach(function(c,i){
        if(i===l.answer)c.classList.add('correct');
        if(i===selectedChoice&&!correct)c.classList.add('wrong');
        c.style.pointerEvents='none';
      });
      document.getElementById('checkBtn').disabled=true;

      var fb=document.getElementById('feedback');
      if(correct){
        fb.className='feedback show success';
        state.score+=10;
        state.stars+=3-state.mistakes;
        state.mistakes=0;
        save();
        document.getElementById('score').textContent=state.score;
        document.getElementById('stars').textContent=Math.max(0,state.stars);
        fb.textContent='✓ Correct! The output is: '+l.choices[l.answer];
        advanceOrFinish('🎉 Quest Complete!');
      }else{
        state.mistakes++;
        fb.className='feedback show error';
        fb.textContent='✗ Wrong! The correct output is: '+l.choices[l.answer]+' — moving to the next level...';
        save();
        advanceOrFinish('Quest Complete!');
      }
    };

    load();
    render();
  </script>
</body>
</html>
