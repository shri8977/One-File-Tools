<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Commands Guru — One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* ========================================
         Reset & Base
         ======================================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'VT323', monospace;
            line-height: 1.6;
            background: #000;
            color: #0f0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* ========================================
         Scanlines
         ======================================== */
        .scanline {
            position: absolute;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0.1), rgba(0, 255, 0, 0.2) 50%, rgba(0, 255, 0, 0.1));
            z-index: 2;
            pointer-events: none;
            animation: scanline linear infinite;
        }

        .scanline:nth-child(1) {
            height: 10px;
            animation-duration: 7s;
        }
        .scanline:nth-child(2) {
            height: 20px;
            animation-duration: 11s;
            animation-direction: reverse;
            animation-delay: -3s;
        }
        .scanline:nth-child(3) {
            height: 8px;
            animation-duration: 8s;
            animation-delay: -5s;
        }
        .scanline:nth-child(4) {
            height: 15px;
            animation-duration: 13s;
            animation-direction: reverse;
            animation-delay: -8s;
        }
        .scanline:nth-child(5) {
            height: 5px;
            animation-duration: 6s;
            animation-delay: -2s;
        }
        .scanline:nth-child(6) {
            height: 12px;
            animation-duration: 10s;
            animation-direction: reverse;
            animation-delay: -1s;
        }

        @keyframes scanline {
            0% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(100vh);
            }
        }

        .container {
            width: 100%;
            max-width: 800px;
            border: 2px solid #0f0;
            padding: 2rem;
            background: rgba(0, 15, 0, 0.8);
            box-shadow: 0 0 15px #0f0, inset 0 0 15px #0f0;
            position: relative;
            z-index: 1;
        }

        #score-container {
            text-align: center;
            margin-bottom: 1rem;
        }

        #score-display {
            font-size: 3rem;
            text-shadow: 0 0 8px #0f0;
        }

        /* ========================================
         Quiz Styles
         ======================================== */
        header h1 {
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 0 5px #0f0;
            margin-bottom: 1rem;
        }

        .warning-text {
            text-align: center;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        #quiz-container {
            display: flex;
            flex-direction: column;
        }

        #question-container {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            border: 1px solid #0f0;
            padding: 1rem;
        }

        #options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .option-btn {
            font-family: 'VT323', monospace;
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 1rem;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, color 0.2s;
        }

        .option-btn:hover {
            background: #0f0;
            color: #000;
        }
        
        .option-btn.correct {
            background: #0f0;
            color: #000;
            animation: blink 0.5s 2;
        }

        .option-btn.incorrect {
            background: #f00;
            color: #000;
            border-color: #f00;
            text-shadow: none;
            box-shadow: 0 0 10px #f00;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        #feedback-container {
            margin-top: 1.5rem;
            font-size: 1.5rem;
            text-align: center;
            height: 2rem;
        }

        #progress-container {
            margin-top: 1rem;
            width: 100%;
            border: 1px solid #0f0;
            height: 20px;
        }

        #progress-bar {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.5s;
        }

        #results-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s ease-in-out 0.5s, transform 0.5s ease-in-out 0.5s;
            width: 100%;
            text-align: center;
        }

        #results-container.visible {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        #results-container #final-score-display {
            font-size: 3rem;
            text-shadow: 0 0 8px #0f0;
        }

        #results-container #final-feedback-text {
            font-size: 25px;
        }

        #results-container #restart-btn {
            font-family: 'VT323', monospace;
            background: #0f0;
            border: 1px solid #0f0;
            color: #000;
            padding: 1rem 2rem;
            font-size: 3rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.5s ease-out;
        }

        footer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            z-index: 3;
        }

        footer a {
            color: #0f0;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="scanline"></div>
    <div class="scanline"></div>
    <div class="scanline"></div>
    <div class="scanline"></div>
    <div class="scanline"></div>

    <div id="score-container">
        <p id="score-display"></p>
    </div>

    <div class="container">
        <header>
            <h1>Git Commands Guru</h1>
        </header>

        <main id="main-content">
            <div id="quiz-container">
                <div id="question-container"></div>
                <div id="options-container"></div>
                <div id="feedback-container"></div>
                <p class="warning-text">Think carefully. You cannot go back and change your answer!</p>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </main>
    </div>
    <div id="results-container">
        <p id="final-score-display"></p>
        <p id="final-feedback-text"></p>
        <button id="restart-btn">Restart Quiz</button>
    </div>
    <footer>
        <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
        const quizData = Object.freeze([
            {
                question: "Which command initializes a new Git repository?",
                options: ["git start", "git new", "git init", "git create"],
                answer: "git init"
            },
            {
                question: "How do you copy a repository from a remote source?",
                options: ["git clone", "git copy", "git fetch", "git pull"],
                answer: "git clone"
            },
            {
                question: "Which command stages files for a commit?",
                options: ["git stage", "git add", "git commit -s", "git track"],
                answer: "git add"
            },
            {
                question: "How do you save your staged changes with a message?",
                options: ["git save", "git push", "git commit -m 'message'", "git log"],
                answer: "git commit -m 'message'"
            },
            {
                question: "Which command sends your committed changes to a remote repository?",
                options: ["git send", "git upload", "git push", "git remote add"],
                answer: "git push"
            },
            {
                question: "How do you fetch and merge changes from the remote repository?",
                options: ["git fetch", "git merge", "git update", "git pull"],
                answer: "git pull"
            },
            {
                question: "What command is used to create a new branch?",
                options: ["git branch <name>", "git new-branch <name>", "git create <name>", "git checkout <name>"],
                answer: "git branch <name>"
            },
            {
                question: "How do you switch to a different branch?",
                options: ["git switch <branch>", "git go <branch>", "git checkout <branch>", "Both A and C"],
                answer: "Both A and C"
            },
            {
                question: "Which command combines the history of two branches?",
                options: ["git combine", "git merge", "git join", "git attach"],
                answer: "git merge"
            },
            {
                question: "What command reapplies commits on top of another base tip?",
                options: ["git rebase", "git replay", "git stack", "git patch"],
                answer: "git rebase"
            }
        ]);

        const STORAGE_KEY = 'gitCommandsGuruProgress';

        const questionContainer = document.getElementById('question-container'),
              optionsContainer = document.getElementById('options-container'),
              feedbackContainer = document.getElementById('feedback-container'),
              progressBar = document.getElementById('progress-bar'),
              quizContainer = document.getElementById('quiz-container'),
              mainContent = document.getElementById('main-content'),
              scoreContainer = document.getElementById('score-container'),
              scoreDisplay = document.getElementById('score-display'),
              resultsContainer = document.getElementById('results-container'),
              finalScoreDisplay = document.getElementById('final-score-display'),
              finalFeedbackText = document.getElementById('final-feedback-text'),
              restartBtn = document.getElementById('restart-btn');

        let currentQuestionIndex = 0;
        let score = 0;

        function loadProgress() {
            const savedProgress = localStorage.getItem(STORAGE_KEY);
            if (savedProgress) {
                const progress = JSON.parse(savedProgress);
                currentQuestionIndex = progress.currentQuestionIndex || 0;
                score = progress.score || 0;
                updateScoreDisplay();
            }
        }

        function saveProgress() {
            const progress = { currentQuestionIndex, score };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        function updateScoreDisplay() {
            scoreDisplay.textContent = `YOUR SCORE: ${score} / ${quizData.length}`;
        }

        function loadQuestion() {
            feedbackContainer.textContent = '';
            const currentQuestion = quizData[currentQuestionIndex];
            questionContainer.textContent = `Q${currentQuestionIndex + 1}: ${currentQuestion.question}`;
            optionsContainer.innerHTML = '';

            currentQuestion.options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.classList.add('option-btn');
                button.addEventListener('click', () => selectAnswer(button, option, currentQuestion.answer));
                optionsContainer.appendChild(button);
            });

            updateProgressBar();
            saveProgress();
        }

        function selectAnswer(button, selectedOption, correctAnswer) {
            const buttons = optionsContainer.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (selectedOption === correctAnswer) {
                button.classList.add('correct');
                feedbackContainer.textContent = 'Correct!';
                feedbackContainer.style.color = '#0f0';
                score++;
            } else {
                button.classList.add('incorrect');
                feedbackContainer.textContent = `Incorrect. The correct answer is ${correctAnswer}.`;
                feedbackContainer.style.color = '#f00';
                // Also highlight the correct answer
                buttons.forEach(btn => {
                    if (btn.textContent === correctAnswer) {
                        btn.classList.add('correct');
                    }
                });
            }

            updateScoreDisplay();
            currentQuestionIndex++;
            saveProgress();

            setTimeout(() => {
                if (currentQuestionIndex >= quizData.length) {
                    showResults();
                } else {
                    loadQuestion();
                }
            }, 2000);
        }
        
        function updateProgressBar() {
            const progressPercentage = (currentQuestionIndex / quizData.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
        }

        function showResults() {
            localStorage.removeItem(STORAGE_KEY);

            // Fade out quiz elements
            document.querySelector('.container').classList.add('fade-out');
            document.getElementById('score-container').classList.add('fade-out');
            document.querySelector('footer').classList.add('fade-out');

            // Prepare results content
            finalScoreDisplay.textContent = `FINAL SCORE: ${score} / ${quizData.length}`;

            let feedback = '';
            const confetti = '🎉 ';
            if (score === 10) {
                feedback = confetti + 'Wow! You are a Git Commands Guru!';
            } else if (score > 5) {
                feedback = confetti + 'Great job! You can still do better next time.';
            } else if (score === 5) {
                feedback = confetti + 'Right in the middle! You can do much better next time.';
            } else {
                feedback = confetti + 'Aww! You did good, but can do so much better next time.';
            }
            finalFeedbackText.innerHTML = feedback;

            // Show results container
            resultsContainer.classList.add('visible');
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;

            // Hide results and show quiz
            resultsContainer.classList.remove('visible');
            document.querySelector('.container').classList.remove('fade-out');
            document.getElementById('score-container').classList.remove('fade-out');
            document.querySelector('footer').classList.remove('fade-out');

            updateScoreDisplay();
            loadQuestion();
        }

        restartBtn.addEventListener('click', restartQuiz);
        // Initial load
        loadProgress();
        updateScoreDisplay();
        loadQuestion();
    </script>
</body>
</html>
