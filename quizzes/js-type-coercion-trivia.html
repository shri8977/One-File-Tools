<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Type Coercion Trivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0;
    --ink:#1B1F3B;
    --ink-soft:#5B5E78;
    --line:#E4DFD1;
    --accent:#E8611A;
    --accent-soft:#FCE3D3;
    --good:#2F9E44;
    --good-soft:#DCF3E1;
    --bad:#D6336C;
    --bad-soft:#FBDCE6;
    --card:#FFFFFF;
    --radius:14px;
    --font-ui:'Space Grotesk', system-ui, sans-serif;
    --font-code:'JetBrains Mono', 'Courier New', monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#14151F;
      --ink:#EDEAE0;
      --ink-soft:#9C9AAE;
      --line:#2B2C3D;
      --accent:#FF8A4C;
      --accent-soft:#3A2416;
      --good:#5FCB7B;
      --good-soft:#173420;
      --bad:#FF6B93;
      --bad-soft:#3A1420;
      --card:#1D1E2C;
    }
  }
  :root[data-theme="dark"]{
    --paper:#14151F;
    --ink:#EDEAE0;
    --ink-soft:#9C9AAE;
    --line:#2B2C3D;
    --accent:#FF8A4C;
    --accent-soft:#3A2416;
    --good:#5FCB7B;
    --good-soft:#173420;
    --bad:#FF6B93;
    --bad-soft:#3A1420;
    --card:#1D1E2C;
  }
  :root[data-theme="light"]{
    --paper:#FAF7F0;
    --ink:#1B1F3B;
    --ink-soft:#5B5E78;
    --line:#E4DFD1;
    --accent:#E8611A;
    --accent-soft:#FCE3D3;
    --good:#2F9E44;
    --good-soft:#DCF3E1;
    --bad:#D6336C;
    --bad-soft:#FBDCE6;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-ui);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    transition:background .3s;
  }
  .app{
    width:100%;
    max-width:560px;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    font-family:var(--font-code);
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .topbar strong{color:var(--accent);}
  .theme-toggle{
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink-soft);
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    line-height:1;
    padding:0;
  }
  .theme-toggle:hover{color:var(--accent); border-color:var(--accent);}
  .topbar-right{display:flex; align-items:center; gap:14px;}
  .card{
    animation:cardIn .35s ease both;
  }
  @keyframes cardIn{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .card{animation:none;}
  }
  .opt{position:relative;}
  .opt .mark{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    font-size:13px;
    font-weight:700;
  }
  .opt.correct .mark{color:var(--good);}
  .opt.wrong .mark{color:var(--bad);}
  .confetti{
    display:flex;
    gap:6px;
    justify-content:center;
    font-size:22px;
    margin:2px 0 14px;
    animation:pop .5s ease both;
  }
  @keyframes pop{
    0%{opacity:0; transform:scale(.6);}
    60%{opacity:1; transform:scale(1.08);}
    100%{transform:scale(1);}
  }
  .progress-track{
    height:4px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
    margin-bottom:28px;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .35s ease;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  h1{
    font-size:28px;
    line-height:1.15;
    margin:0 0 10px;
  }
  .lede{
    color:var(--ink-soft);
    font-size:15px;
    line-height:1.55;
    margin:0 0 24px;
  }
  .snippet{
    font-family:var(--font-code);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 20px;
    font-size:16px;
    margin-bottom:20px;
    position:relative;
    overflow-x:auto;
    white-space:pre;
  }
  .snippet::before{
    content:'>';
    color:var(--accent);
    margin-right:10px;
  }
  .prompt{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 16px;
  }
  .options{
    display:grid;
    gap:10px;
    margin-bottom:8px;
  }
  .opt{
    font-family:var(--font-code);
    text-align:left;
    padding:13px 16px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
    font-size:15px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .opt:hover:not(:disabled){border-color:var(--accent);}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--good-soft); border-color:var(--good); color:var(--good);}
  .opt.wrong{background:var(--bad-soft); border-color:var(--bad); color:var(--bad);}
  .opt.reveal{background:var(--good-soft); border-color:var(--good); color:var(--good);}
  .feedback{
    margin-top:18px;
    padding:16px 18px;
    border-radius:10px;
    background:var(--accent-soft);
    border-left:3px solid var(--accent);
    font-size:14px;
    line-height:1.55;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback b{color:var(--ink);}
  .actions{
    display:flex;
    justify-content:flex-end;
    margin-top:22px;
  }
  button.primary{
    font-family:var(--font-ui);
    font-weight:700;
    font-size:14px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    padding:12px 22px;
    border-radius:99px;
    cursor:pointer;
    display:none;
  }
  button.primary.show{display:inline-block;}
  button.primary:hover{opacity:.88;}
  .start-btn, .restart-btn{
    font-family:var(--font-ui);
    font-weight:700;
    font-size:15px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:14px 26px;
    border-radius:99px;
    cursor:pointer;
  }
  .start-btn:hover, .restart-btn:hover{opacity:.9;}
  .score{
    font-family:var(--font-code);
    font-size:48px;
    color:var(--accent);
    margin:6px 0 4px;
  }
  .visually-hidden{
    position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);
  }
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  @media (max-width:480px){
    .card{padding:22px;}
    h1{font-size:23px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span>JS Type Coercion Trivia</span>
    <span class="topbar-right">
      <span id="statusLine"><strong id="scoreLine">0</strong>/8</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
    </span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="card" id="cardStart">
    <h1>Guess the output.</h1>
    <p class="lede">JavaScript will coerce almost anything into almost anything else. Eight snippets, eight verdicts &mdash; see how well your instincts hold up against the engine's.</p>
    <button class="start-btn" id="startBtn">Start quiz</button>
  </div>

  <div class="card" id="cardQuiz" style="display:none;">
    <p class="prompt" id="levelLabel">Level 1 of 8</p>
    <div class="snippet" id="snippetText"></div>
    <p class="prompt">What does this evaluate to?</p>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback" id="feedback"></div>
    <div class="actions"><button class="primary" id="nextBtn">Next</button></div>
  </div>

  <div class="card" id="cardEnd" style="display:none;">
    <div class="confetti" id="confettiRow" aria-hidden="true"></div>
    <h1>Quiz complete</h1>
    <p class="lede">You called it correctly on:</p>
    <div class="score"><span id="finalScore">0</span>/8</div>
    <p class="lede" id="finalRemark"></p>
    <button class="restart-btn" id="restartBtn">Try again</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'js-type-coercion-trivia:progress';

const LEVELS = [
  {
    snippet: `[] + []`,
    options: [`""`, `undefined`, `NaN`, `"[]"`],
    answer: 0,
    explanation: `Both arrays are converted to strings via <b>toString()</b>, which turns an empty array into <code>""</code>. Concatenating two empty strings gives you <code>""</code>.`
  },
  {
    snippet: `[] + {}`,
    options: [`NaN`, `"[object Object]"`, `undefined`, `TypeError`],
    answer: 1,
    explanation: `<code>[]</code> becomes <code>""</code> and <code>{}</code> becomes <code>"[object Object]"</code> via string coercion. String-concatenating them gives <code>"[object Object]"</code>.`
  },
  {
    snippet: `'5' - 1`,
    options: [`"51"`, `"4"`, `4`, `NaN`],
    answer: 2,
    explanation: `The <b>-</b> operator only makes sense for numbers, so JS coerces <code>'5'</code> to the number <code>5</code>, giving <code>4</code>.`
  },
  {
    snippet: `'5' + 1`,
    options: [`6`, `"51"`, `"6"`, `NaN`],
    answer: 1,
    explanation: `The <b>+</b> operator prefers string concatenation when either side is a string, so <code>1</code> becomes <code>"1"</code> and the result is <code>"51"</code>.`
  },
  {
    snippet: `null == undefined`,
    options: [`true`, `false`, `TypeError`, `undefined`],
    answer: 0,
    explanation: `Loose equality treats <code>null</code> and <code>undefined</code> as equal to each other (and to nothing else). No coercion needed &mdash; it's a special case.`
  },
  {
    snippet: `null === undefined`,
    options: [`true`, `false`, `null`, `undefined`],
    answer: 1,
    explanation: `Strict equality never coerces types. <code>null</code> and <code>undefined</code> are different types, so they're not strictly equal.`
  },
  {
    snippet: `NaN === NaN`,
    options: [`true`, `false`, `NaN`, `TypeError`],
    answer: 1,
    explanation: `NaN is the only value in JavaScript that is never equal to itself, by design (per the IEEE 754 spec). Use <code>Number.isNaN()</code> to check for it.`
  },
  {
    snippet: `!!"0"`,
    options: [`true`, `false`, `"0"`, `0`],
    answer: 0,
    explanation: `Only <code>""</code> is a falsy string. <code>"0"</code> is a non-empty string, so it's truthy &mdash; double-negating it gives <code>true</code>.`
  }
];

let state = { level: 0, score: 0, answered: false, finished: false, answers: [] };

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(typeof parsed.level === 'number' && Array.isArray(parsed.answers)){
        state = parsed;
      }
    }
  }catch(e){ /* ignore corrupt storage */ }
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ /* storage unavailable */ }
}

const cardStart = document.getElementById('cardStart');
const cardQuiz = document.getElementById('cardQuiz');
const cardEnd = document.getElementById('cardEnd');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const nextBtn = document.getElementById('nextBtn');
const levelLabel = document.getElementById('levelLabel');
const snippetText = document.getElementById('snippetText');
const optionsWrap = document.getElementById('optionsWrap');
const feedback = document.getElementById('feedback');
const progressFill = document.getElementById('progressFill');
const scoreLine = document.getElementById('scoreLine');
const finalScore = document.getElementById('finalScore');
const finalRemark = document.getElementById('finalRemark');

function updateTopbar(){
  scoreLine.textContent = state.score;
  const pct = state.finished ? 100 : Math.round((state.level / LEVELS.length) * 100);
  progressFill.style.width = pct + '%';
}

function renderStart(){
  cardStart.style.display = 'block';
  cardQuiz.style.display = 'none';
  cardEnd.style.display = 'none';
}

function renderQuiz(){
  cardStart.style.display = 'none';
  cardQuiz.style.display = 'block';
  cardEnd.style.display = 'none';

  const idx = state.level;
  const lvl = LEVELS[idx];
  levelLabel.textContent = `Level ${idx + 1} of ${LEVELS.length}`;
  snippetText.textContent = lvl.snippet;
  optionsWrap.innerHTML = '';
  feedback.classList.remove('show');
  feedback.innerHTML = '';
  nextBtn.classList.remove('show');

  const prior = state.answers[idx];
  lvl.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    const label = document.createElement('span');
    label.textContent = opt;
    btn.appendChild(label);
    btn.addEventListener('click', () => selectAnswer(i));
    if(prior !== undefined){
      btn.disabled = true;
      if(i === lvl.answer){
        btn.classList.add('correct');
        const mark = document.createElement('span');
        mark.className = 'mark';
        mark.textContent = '✓';
        btn.appendChild(mark);
      }else if(i === prior && prior !== lvl.answer){
        btn.classList.add('wrong');
        const mark = document.createElement('span');
        mark.className = 'mark';
        mark.textContent = '✕';
        btn.appendChild(mark);
      }
    }
    optionsWrap.appendChild(btn);
  });

  if(prior !== undefined){
    showFeedback(lvl, prior);
    nextBtn.classList.add('show');
  }

  updateTopbar();
}

function showFeedback(lvl, chosenIdx){
  const wasCorrect = chosenIdx === lvl.answer;
  feedback.classList.add('show');
  const lead = wasCorrect ? '<b>Correct.</b>' : '<b>Not quite.</b>';
  feedback.innerHTML = lead + ' ' + lvl.explanation;
}

function selectAnswer(i){
  if(state.answers[state.level] !== undefined) return;
  const lvl = LEVELS[state.level];
  state.answers[state.level] = i;
  if(i === lvl.answer) state.score += 1;
  saveState();
  renderQuiz();
}

nextBtn.addEventListener('click', () => {
  if(state.level < LEVELS.length - 1){
    state.level += 1;
    saveState();
    renderQuiz();
  }else{
    state.finished = true;
    saveState();
    renderEnd();
  }
});

function renderEnd(){
  cardStart.style.display = 'none';
  cardQuiz.style.display = 'none';
  cardEnd.style.display = 'block';
  finalScore.textContent = state.score;
  updateTopbar();

  const pct = state.score / LEVELS.length;
  let remark, icons;
  if(pct === 1){ remark = "Perfect score. The engine has nothing left to teach you."; icons = '🏆✨🏆'; }
  else if(pct >= 0.75){ remark = "Strong instincts &mdash; a couple of edge cases got you."; icons = '⚡️✓⚡️'; }
  else if(pct >= 0.5){ remark = "Solid grasp of the basics, with some quirks still to learn."; icons = '🧪✓🧪'; }
  else{ remark = "Coercion is famously unintuitive &mdash; worth another lap."; icons = '🔁🧪🔁'; }
  finalRemark.textContent = remark;
  const confettiRow = document.getElementById('confettiRow');
  if(confettiRow) confettiRow.textContent = icons;
}

startBtn.addEventListener('click', () => {
  state = { level: 0, score: 0, answered: false, finished: false, answers: [] };
  saveState();
  renderQuiz();
});

restartBtn.addEventListener('click', () => {
  state = { level: 0, score: 0, answered: false, finished: false, answers: [] };
  saveState();
  renderQuiz();
});

const THEME_KEY = 'js-type-coercion-trivia:theme';
const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme){
  if(theme === 'dark' || theme === 'light'){
    document.documentElement.setAttribute('data-theme', theme);
  }else{
    document.documentElement.removeAttribute('data-theme');
  }
  themeToggle.textContent = theme === 'dark' ? '☀' : '◐';
}

function loadTheme(){
  let saved = null;
  try{ saved = localStorage.getItem(THEME_KEY); }catch(e){ /* storage unavailable */ }
  applyTheme(saved);
}

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const currentlyDark = current ? current === 'dark' : prefersDark;
  const next = currentlyDark ? 'light' : 'dark';
  applyTheme(next);
  try{ localStorage.setItem(THEME_KEY, next); }catch(e){ /* storage unavailable */ }
});

loadTheme();
loadState();
if(state.finished){
  renderEnd();
}else if(state.answers.length > 0 || state.level > 0){
  renderQuiz();
}else{
  renderStart();
}
updateTopbar();
</script>
</body>
</html>
