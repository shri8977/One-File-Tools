<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Search Dropdown — One File Design System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Quicksand", "system-ui", "sans-serif"] }
          }
        }
      };
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Quicksand", system-ui, sans-serif;
      }
      .dropdown-enter {
        animation: dropIn 0.2s ease-out;
      }
      @keyframes dropIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
    </style>
  </head>
  <body class="min-h-screen bg-amber-50/40 dark:bg-gray-950 transition-colors duration-300">
    <!-- Theme Toggle -->
    <div class="fixed top-4 right-4 z-50">
      <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-md transition-all" aria-label="Toggle dark mode">
        <svg class="w-5 h-5 text-amber-500 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <svg class="w-5 h-5 text-gray-600 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
      </button>
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto px-4 pt-10 pb-12">
      <!-- Header -->
      <div class="text-center mb-8 fade-in">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#fffce8] border-[#ffe9a0] border dark:bg-gray-800 mb-4">
          <svg class="w-7 h-7 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-1">Product Search</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Find products by name, category, or price</p>
      </div>

      <!-- Search Component -->
      <div class="relative" id="searchContainer">
        <!-- Search Input -->
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          </div>
          <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off" class="w-full pl-10 pr-8 py-2 border border-[#ffe9a0] dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 placeholder-stone-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#ffe9a0] text-sm" />
          <button id="clearBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden" onclick="clearSearch()">
            <svg class="w-4 h-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>

        <!-- Category Pills -->
        <div class="flex gap-2 mt-3 flex-wrap">
          <button onclick="filterCategory('all')" class="cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fff8bf] text-stone-700 dark:bg-amber-700 dark:text-amber-100" data-cat="all">All</button>
          <button onclick="filterCategory('phones')" class="cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fffce8] dark:bg-gray-800 text-stone-500 dark:text-gray-400 hover:bg-[#fff8bf] dark:hover:bg-gray-700" data-cat="phones">Phones</button>
          <button onclick="filterCategory('laptops')" class="cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fffce8] dark:bg-gray-800 text-stone-500 dark:text-gray-400 hover:bg-[#fff8bf] dark:hover:bg-gray-700" data-cat="laptops">Laptops</button>
          <button onclick="filterCategory('audio')" class="cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fffce8] dark:bg-gray-800 text-stone-500 dark:text-gray-400 hover:bg-[#fff8bf] dark:hover:bg-gray-700" data-cat="audio">Audio</button>
          <button onclick="filterCategory('wearables')" class="cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fffce8] dark:bg-gray-800 text-stone-500 dark:text-gray-400 hover:bg-[#fff8bf] dark:hover:bg-gray-700" data-cat="wearables">Wearables</button>
          <button onclick="filterCategory('accessories')" class="cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fffce8] dark:bg-gray-800 text-stone-500 dark:text-gray-400 hover:bg-[#fff8bf] dark:hover:bg-gray-700" data-cat="accessories">Accessories</button>
        </div>

        <!-- Dropdown Results -->
        <div id="dropdown" class="absolute w-full mt-2 bg-white dark:bg-gray-900 border border-[#ffe9a0] dark:border-gray-700 rounded-lg shadow-lg overflow-hidden dropdown-enter z-40">
          <div id="resultCount" class="px-4 py-2 text-xs font-medium text-stone-400 dark:text-gray-500 border-b border-[#fff3d6] dark:border-gray-800 bg-[#fffce8] dark:bg-gray-800/50"></div>
          <ul id="resultsList" class="divide-y divide-[#fff3d6] dark:divide-gray-800 max-h-72 overflow-y-auto"></ul>
          <div id="emptyState" class="hidden px-4 py-8 text-center">
            <p class="text-sm font-medium text-gray-400 dark:text-gray-500">No products found</p>
            <p class="text-xs text-gray-300 dark:text-gray-600 mt-0.5">Try a different search term</p>
          </div>
        </div>
      </div>

      <!-- Selected Product Detail -->
      <div id="selectedProduct" class="hidden mt-4 p-4 bg-white dark:bg-gray-900 border border-[#ffe9a0] dark:border-gray-700 rounded-lg shadow-sm fade-in">
        <div class="flex items-start gap-3">
          <div id="selectedEmoji" class="w-12 h-12 rounded-lg bg-gray-50 dark:bg-gray-800 flex items-center justify-center text-2xl flex-shrink-0"></div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h3 id="selectedName" class="text-sm font-semibold text-gray-800 dark:text-gray-100"></h3>
                <p id="selectedCategory" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5"></p>
              </div>
              <span id="selectedPrice" class="text-base font-bold text-gray-800 dark:text-gray-100 flex-shrink-0"></span>
            </div>
            <p id="selectedDesc" class="text-xs text-gray-500 dark:text-gray-400 mt-2 leading-relaxed"></p>
            <div class="flex gap-2 mt-2">
              <span id="selectedRating" class="inline-flex items-center px-2 py-0.5 rounded-full bg-amber-50 dark:bg-amber-900/30 text-xs font-medium text-amber-700 dark:text-amber-400"></span>
              <span id="selectedStock" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="text-center mt-10 text-xs text-gray-400 dark:text-gray-500">Part of <a href="https://github.com/praveenscience/One-File-Tools" class="text-blue-500 hover:underline">One File Tools</a> — Design System Showcase</footer>
    </div>

    <script>
      (function () {
        const isDark = localStorage.getItem("theme") === "dark" || (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) document.documentElement.classList.add("dark");
      })();

      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
        localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
      }

      const products = [
        { name: "iPhone 15 Pro", price: 1199, category: "phones", emoji: "\u{1F4F1}", desc: "Titanium design with A17 Pro chip, 48MP camera system, and USB-C.", rating: 4.8, stock: true },
        { name: "iPhone 15", price: 999, category: "phones", emoji: "\u{1F4F1}", desc: "Dynamic Island, 48MP camera, and all-day battery life.", rating: 4.7, stock: true },
        { name: "Samsung Galaxy S24", price: 899, category: "phones", emoji: "\u{1F4F1}", desc: "Galaxy AI features with a stunning 6.2-inch AMOLED display.", rating: 4.6, stock: true },
        { name: "Google Pixel 8", price: 699, category: "phones", emoji: "\u{1F4F1}", desc: "Best-in-class camera with Google Tensor G3 chip.", rating: 4.5, stock: false },
        { name: "MacBook Air M3", price: 1199, category: "laptops", emoji: "\u{1F4BB}", desc: "Fanless design with M3 chip, 18-hour battery, and Liquid Retina display.", rating: 4.9, stock: true },
        { name: 'MacBook Pro 14"', price: 1999, category: "laptops", emoji: "\u{1F4BB}", desc: "M3 Pro chip with Liquid Retina XDR display for professionals.", rating: 4.9, stock: true },
        { name: "Dell XPS 15", price: 1499, category: "laptops", emoji: "\u{1F4BB}", desc: "InfinityEdge display with 13th Gen Intel Core processor.", rating: 4.4, stock: true },
        { name: "ThinkPad X1 Carbon", price: 1649, category: "laptops", emoji: "\u{1F4BB}", desc: "Ultra-lightweight business laptop with legendary keyboard.", rating: 4.5, stock: false },
        { name: "AirPods Pro 2", price: 249, category: "audio", emoji: "\u{1F3A7}", desc: "Adaptive noise cancellation with USB-C and personalized spatial audio.", rating: 4.7, stock: true },
        { name: "AirPods Max", price: 549, category: "audio", emoji: "\u{1F3A7}", desc: "High-fidelity over-ear headphones with computational audio.", rating: 4.3, stock: true },
        { name: "Sony WH-1000XM5", price: 349, category: "audio", emoji: "\u{1F3A7}", desc: "Industry-leading noise cancellation with 30-hour battery life.", rating: 4.8, stock: true },
        { name: "Bose QC Ultra", price: 429, category: "audio", emoji: "\u{1F3A7}", desc: "Immersive spatial audio with world-class noise cancelling.", rating: 4.6, stock: false },
        { name: "Apple Watch Ultra 2", price: 799, category: "wearables", emoji: "⌚", desc: "Rugged titanium case with precision dual-frequency GPS.", rating: 4.7, stock: true },
        { name: "Apple Watch Series 9", price: 399, category: "wearables", emoji: "⌚", desc: "Double tap gesture, S9 chip, and always-on Retina display.", rating: 4.6, stock: true },
        { name: "Samsung Galaxy Watch 6", price: 299, category: "wearables", emoji: "⌚", desc: "Advanced health monitoring with a sleek rotating bezel.", rating: 4.4, stock: true },
        { name: "MagSafe Charger", price: 39, category: "accessories", emoji: "\u{1F50C}", desc: "Perfectly aligned wireless charging for iPhone and AirPods.", rating: 4.3, stock: true },
        { name: "Apple Pencil Pro", price: 129, category: "accessories", emoji: "✏️", desc: "Barrel roll, squeeze gesture, and haptic feedback for iPad.", rating: 4.8, stock: true },
        { name: "Magic Keyboard", price: 299, category: "accessories", emoji: "⌨️", desc: "Full-size keyboard with Touch ID and numeric keypad.", rating: 4.5, stock: false }
      ];

      let activeCategory = "all";
      let searchTerm = "";
      let selectedIndex = -1;

      const searchInput = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const resultsList = document.getElementById("resultsList");
      const resultCount = document.getElementById("resultCount");
      const emptyState = document.getElementById("emptyState");
      const selectedProduct = document.getElementById("selectedProduct");

      function getFiltered() {
        return products.filter((p) => {
          const matchesCat = activeCategory === "all" || p.category === activeCategory;
          const matchesSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm) || p.category.toLowerCase().includes(searchTerm) || p.desc.toLowerCase().includes(searchTerm);
          return matchesCat && matchesSearch;
        });
      }

      function render() {
        const filtered = getFiltered();
        clearBtn.classList.toggle("hidden", !searchTerm);

        if (filtered.length === 0) {
          resultsList.innerHTML = "";
          resultCount.classList.add("hidden");
          emptyState.classList.remove("hidden");
          selectedIndex = -1;
          return;
        }

        emptyState.classList.add("hidden");
        resultCount.classList.remove("hidden");
        resultCount.textContent = filtered.length + " product" + (filtered.length !== 1 ? "s" : "") + (activeCategory !== "all" ? " in " + activeCategory : "");

        if (selectedIndex >= filtered.length) selectedIndex = filtered.length - 1;

        resultsList.innerHTML = filtered
          .map((p, i) => {
            const highlight = i === selectedIndex ? " bg-gray-50 dark:bg-gray-800" : "";
            const nameHtml = searchTerm ? p.name.replace(new RegExp("(" + searchTerm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi"), '<mark class="bg-yellow-200 dark:bg-yellow-700/50 text-inherit rounded px-0.5">$1</mark>') : p.name;
            return '<li class="flex justify-between items-center px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer transition-colors' + highlight + '" data-index="' + i + '" onclick="selectProduct(' + i + ')">' + '<div class="flex items-center gap-2">' + '<span class="text-sm font-medium text-gray-800 dark:text-gray-200">' + nameHtml + "</span>" + "</div>" + '<span class="text-sm font-semibold text-gray-600 dark:text-gray-400">$' + p.price.toLocaleString() + "</span>" + "</li>";
          })
          .join("");
      }

      function selectProduct(index) {
        const filtered = getFiltered();
        const p = filtered[index];
        if (!p) return;

        selectedProduct.classList.remove("hidden");
        document.getElementById("selectedEmoji").textContent = p.emoji;
        document.getElementById("selectedName").textContent = p.name;
        document.getElementById("selectedCategory").textContent = p.category.charAt(0).toUpperCase() + p.category.slice(1);
        document.getElementById("selectedPrice").textContent = "$" + p.price.toLocaleString();
        document.getElementById("selectedDesc").textContent = p.desc;
        document.getElementById("selectedRating").textContent = "★ " + p.rating + " / 5";

        const stockEl = document.getElementById("selectedStock");
        if (p.stock) {
          stockEl.textContent = "In Stock";
          stockEl.className = "inline-flex items-center px-2 py-0.5 rounded-full bg-green-50 dark:bg-green-900/30 text-xs font-medium text-green-700 dark:text-green-400";
        } else {
          stockEl.textContent = "Out of Stock";
          stockEl.className = "inline-flex items-center px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-xs font-medium text-gray-500 dark:text-gray-400";
        }

        selectedProduct.classList.remove("fade-in");
        void selectedProduct.offsetWidth;
        selectedProduct.classList.add("fade-in");
      }

      function clearSearch() {
        searchInput.value = "";
        searchTerm = "";
        selectedIndex = -1;
        selectedProduct.classList.add("hidden");
        render();
        searchInput.focus();
      }

      function filterCategory(cat) {
        activeCategory = cat;
        selectedIndex = -1;
        selectedProduct.classList.add("hidden");

        document.querySelectorAll(".cat-pill").forEach((btn) => {
          if (btn.dataset.cat === cat) {
            btn.className = "cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fff8bf] text-stone-700 dark:bg-amber-700 dark:text-amber-100";
          } else {
            btn.className = "cat-pill px-3 py-1 text-xs font-medium rounded-full transition-all bg-[#fffce8] dark:bg-gray-800 text-stone-500 dark:text-gray-400 hover:bg-[#fff8bf] dark:hover:bg-gray-700";
          }
        });

        render();
      }

      searchInput.addEventListener("input", (e) => {
        searchTerm = e.target.value.toLowerCase().trim();
        selectedIndex = -1;
        selectedProduct.classList.add("hidden");
        render();
      });

      searchInput.addEventListener("keydown", (e) => {
        const filtered = getFiltered();
        if (e.key === "ArrowDown") {
          e.preventDefault();
          selectedIndex = Math.min(selectedIndex + 1, filtered.length - 1);
          render();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          selectedIndex = Math.max(selectedIndex - 1, -1);
          render();
        } else if (e.key === "Enter" && selectedIndex >= 0) {
          e.preventDefault();
          selectProduct(selectedIndex);
        } else if (e.key === "Escape") {
          clearSearch();
        }
      });

      render();
    </script>
  </body>
</html>
