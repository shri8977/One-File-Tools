<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Quest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --paper:#eef1f8;
  --paper-line:#c7d0e8;
  --paper-line-strong:#a9b6dd;
  --ink:#1b2440;
  --ink-soft:#5b6690;
  --panel:#ffffff;
  --accent:#ff5a36;
  --accent-ink:#ffffff;
  --good:#17a673;
  --bad:#d64550;
  --amber:#ffb703;
  --shadow: 0 1px 0 rgba(27,36,64,0.05);
  --radius: 4px;
}
[data-theme="dark"]{
  --paper:#0e1220;
  --paper-line:#232a45;
  --paper-line-strong:#333c63;
  --ink:#eef1f8;
  --ink-soft:#8f9ac2;
  --panel:#151a2c;
  --accent:#ff6a45;
  --accent-ink:#101322;
  --good:#2bc98a;
  --bad:#ef5b64;
  --amber:#ffc93c;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Space Grotesk', Arial, sans-serif;
  background:
    linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/28px 28px,
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0/28px 28px,
    var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding:28px 20px 60px;
  transition:background 0.2s ease, color 0.2s ease;
}

.mono{font-family:'JetBrains Mono', monospace;}

.wrap{max-width:920px; margin:0 auto;}

/* ---------- Header ---------- */
header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:22px;
  flex-wrap:wrap;
}
.title-block .eyebrow{
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  letter-spacing:2px;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:6px;
}
h1{
  font-size:32px;
  margin:0;
  font-weight:700;
  letter-spacing:-0.5px;
}
.title-block p{
  margin:6px 0 0;
  color:var(--ink-soft);
  font-size:14px;
  max-width:480px;
}
.hud{
  display:flex;
  gap:10px;
  align-items:center;
}
.score-chip{
  background:var(--panel);
  border:1px solid var(--paper-line-strong);
  border-radius:var(--radius);
  padding:10px 16px;
  text-align:right;
  box-shadow:var(--shadow);
}
.score-chip .num{
  font-family:'JetBrains Mono', monospace;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
  line-height:1;
}
.score-chip .lab{
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-top:2px;
}
#themeToggle{
  background:var(--panel);
  border:1px solid var(--paper-line-strong);
  border-radius:var(--radius);
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:16px;
  color:var(--ink);
  box-shadow:var(--shadow);
}
#themeToggle:hover{border-color:var(--accent);}

/* ---------- Progress dots ---------- */
.progress{
  display:flex;
  gap:8px;
  margin-bottom:22px;
  flex-wrap:wrap;
}
.dot{
  flex:1;
  min-width:60px;
  padding:9px 6px;
  text-align:center;
  border-radius:var(--radius);
  border:1px solid var(--paper-line-strong);
  background:var(--panel);
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  color:var(--ink-soft);
  cursor:pointer;
  user-select:none;
  transition:all 0.15s;
}
.dot .n{display:block; font-weight:700; font-size:13px; color:var(--ink); margin-bottom:2px;}
.dot.locked{opacity:0.4; cursor:not-allowed;}
.dot.current{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
.dot.done{background:var(--good); border-color:var(--good);}
.dot.done .n, .dot.done{color:#fff;}

/* ---------- Panel shell ---------- */
.panel{
  background:var(--panel);
  border:1px solid var(--paper-line-strong);
  border-radius:6px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.level-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:12px;
  margin-bottom:6px;
  flex-wrap:wrap;
}
.level-head h2{
  margin:0;
  font-size:20px;
}
.level-tag{
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  color:var(--ink-soft);
  letter-spacing:1px;
  text-transform:uppercase;
}
.brief{
  color:var(--ink-soft);
  font-size:14px;
  margin:6px 0 20px;
  max-width:600px;
}

/* ---------- Blueprint previews ---------- */
.stage{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:22px;
}
@media (max-width:640px){ .stage{grid-template-columns:1fr;} }

.blueprint{
  position:relative;
  border:1px dashed var(--paper-line-strong);
  border-radius:4px;
  padding:26px 16px 16px;
  background:
    linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/14px 14px,
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0/14px 14px,
    var(--paper);
}
.blueprint .corner{
  position:absolute;
  width:10px;
  height:10px;
  border:2px solid var(--accent);
}
.blueprint .corner.tl{top:6px; left:6px; border-right:none; border-bottom:none;}
.blueprint .corner.tr{top:6px; right:6px; border-left:none; border-bottom:none;}
.blueprint .corner.bl{bottom:6px; left:6px; border-right:none; border-top:none;}
.blueprint .corner.br{bottom:6px; right:6px; border-left:none; border-top:none;}
.blueprint .caption{
  position:absolute;
  top:6px;
  left:22px;
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-soft);
}

.grid-box{
  min-height:150px;
  border:1px solid var(--paper-line-strong);
  background:var(--panel);
  padding:8px;
}
.grid-box .cell{
  background:rgba(255,90,54,0.08);
  border:1px solid var(--accent);
  border-radius:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  color:var(--accent);
  min-height:38px;
  font-weight:600;
}
[data-theme="dark"] .grid-box .cell{background:rgba(255,106,69,0.14);}

/* ---------- Controls ---------- */
.control-group{
  margin-bottom:16px;
}
.control-group .prop-label{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  color:var(--ink-soft);
  margin-bottom:8px;
  display:block;
}
.control-group .prop-label::after{content:":";}
.opt-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.opt-btn{
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  padding:9px 14px;
  border-radius:4px;
  border:1px solid var(--paper-line-strong);
  background:var(--panel);
  color:var(--ink);
  cursor:pointer;
  transition:all 0.12s;
}
.opt-btn:hover{border-color:var(--accent); color:var(--accent);}
.opt-btn.selected{
  background:var(--accent);
  border-color:var(--accent);
  color:var(--accent-ink);
}

/* ---------- Action row ---------- */
.action-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:6px;
}
button.primary{
  font-family:'Space Grotesk', sans-serif;
  font-weight:600;
  font-size:14px;
  padding:11px 22px;
  border-radius:4px;
  border:none;
  background:var(--ink);
  color:var(--paper);
  cursor:pointer;
}
[data-theme="dark"] button.primary{background:var(--accent); color:#101322;}
button.primary:hover{opacity:0.88;}
button.ghost{
  font-family:'Space Grotesk', sans-serif;
  font-size:14px;
  padding:10px 18px;
  border-radius:4px;
  border:1px solid var(--paper-line-strong);
  background:transparent;
  color:var(--ink-soft);
  cursor:pointer;
}
button.ghost:hover{border-color:var(--amber); color:var(--amber);}
button:disabled{opacity:0.4; cursor:not-allowed;}

.feedback{
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  padding:11px 14px;
  border-radius:4px;
  margin-top:14px;
  display:none;
}
.feedback.show{display:block;}
.feedback.good{background:rgba(23,166,115,0.12); color:var(--good); border:1px solid var(--good);}
.feedback.bad{background:rgba(214,69,80,0.12); color:var(--bad); border:1px solid var(--bad);}
.feedback.hint{background:rgba(255,183,3,0.14); color:#8a6300; border:1px solid var(--amber);}
[data-theme="dark"] .feedback.hint{color:var(--amber);}

footer{
  text-align:center;
  color:var(--ink-soft);
  font-size:11px;
  font-family:'JetBrains Mono', monospace;
  margin-top:26px;
  letter-spacing:0.5px;
}

/* ---------- Finale ---------- */
.finale{
  text-align:center;
  padding:40px 20px;
}
.finale .big{
  font-family:'JetBrains Mono', monospace;
  font-size:44px;
  font-weight:700;
  color:var(--accent);
  margin:8px 0;
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <div class="eyebrow">// interactive quest</div>
      <h1>CSS Grid Quest</h1>
      <p>Learn CSS Grid one blueprint at a time. Match the target layout, ship the declaration, level up.</p>
    </div>
    <div class="hud">
      <div class="score-chip">
        <div class="num" id="scoreVal">0</div>
        <div class="lab">Score</div>
      </div>
      <button id="themeToggle" title="Toggle dark mode">◐</button>
    </div>
  </header>

  <div class="progress" id="progress"></div>

  <div id="gameArea"></div>

  <footer>MODULE 06 · DIFFICULTY: EASY · PROGRESS RESETS EACH SESSION</footer>
</div>

<script>
/* ================= LEVEL DATA ================= */
const LEVELS = [
  {
    id:1, title:"Grid Basics", tag:"Level 01 — Foundations",
    brief:"This block is stacking its children the old way. Switch on CSS Grid.",
    cells:4,
    base:{},
    properties:[
      { key:"display", css:"display", options:["block","flex","grid"] }
    ],
    target:{ display:"grid" },
    hint:"The property that activates Grid layout is display — set it to grid."
  },
  {
    id:2, title:"Column Sizes", tag:"Level 02 — Tracks",
    brief:"Give this grid three equal columns using fr units.",
    cells:6,
    base:{ display:"grid" },
    properties:[
      { key:"columns", css:"grid-template-columns", options:["none","1fr 1fr 1fr","100px 200px 100px","2fr 1fr 1fr"] }
    ],
    target:{ columns:"1fr 1fr 1fr" },
    hint:"grid-template-columns defines the number and width of columns. Equal fr values split space evenly."
  },
  {
    id:3, title:"Gap Practice", tag:"Level 03 — Spacing",
    brief:"The cells are touching. Add breathing room between rows and columns.",
    cells:6,
    base:{ display:"grid", columns:"1fr 1fr 1fr" },
    properties:[
      { key:"gap", css:"gap", options:["0","8px","16px","32px"] }
    ],
    target:{ gap:"16px" },
    hint:"gap sets spacing on both axes at once — rows and columns together."
  },
  {
    id:4, title:"Repeat Function", tag:"Level 04 — Efficiency",
    brief:"Build six equal columns — the clean way, with repeat().",
    cells:6,
    base:{ display:"grid" },
    properties:[
      { key:"columns", css:"grid-template-columns", options:["repeat(6, 1fr)","1fr 1fr 1fr 1fr 1fr 1fr","repeat(3, 2fr)","repeat(6, 60px)"] }
    ],
    target:{ columns:"repeat(6, 1fr)" },
    hint:"repeat(count, size) avoids writing the same track six times. Both a literal list and repeat() can render the same result, but repeat() is the maintainable choice."
  },
  {
    id:5, title:"No Gap", tag:"Level 05 — Independent Axes",
    brief:"Columns should touch edge-to-edge. Rows still need clear separation.",
    cells:6,
    base:{ display:"grid", columns:"1fr 1fr 1fr" },
    properties:[
      { key:"columnGap", css:"column-gap", options:["0","16px","24px","32px"] },
      { key:"rowGap", css:"row-gap", options:["0","16px","24px","32px"] }
    ],
    target:{ columnGap:"0", rowGap:"24px" },
    hint:"column-gap and row-gap control each axis independently. Set one to 0 to remove it entirely."
  },
  {
    id:6, title:"Grand Finale", tag:"Level 06 — Full Blueprint",
    brief:"Combine everything: four columns, two rows, and a gap to finish the schematic.",
    cells:8,
    base:{ display:"grid" },
    properties:[
      { key:"columns", css:"grid-template-columns", options:["repeat(4, 1fr)","repeat(2, 1fr)","1fr 1fr 1fr 1fr","repeat(4, 100px)"] },
      { key:"rows", css:"grid-template-rows", options:["repeat(2, 80px)","repeat(4, 80px)","80px","auto auto"] },
      { key:"gap", css:"gap", options:["0","12px","24px","32px"] }
    ],
    target:{ columns:"repeat(4, 1fr)", rows:"repeat(2, 80px)", gap:"12px" },
    hint:"Combine repeat() on both axes with a gap value to complete the full blueprint."
  }
];

/* ================= STATE (in-memory only — no localStorage in artifacts) ================= */
let state = {
  currentLevel: 0,
  unlocked: 0,
  score: 0,
  selections: {},
  wrongAttempts: 0,
  hintUsed: false,
  feedback: null,
  completed: []
};

const gameArea = document.getElementById('gameArea');
const progressEl = document.getElementById('progress');
const scoreVal = document.getElementById('scoreVal');

function buildStyleObject(props){
  const map = { display:"display", columns:"grid-template-columns", rows:"grid-template-rows",
                gap:"gap", columnGap:"column-gap", rowGap:"row-gap" };
  let css = {};
  for(const k in props){ if(map[k]) css[map[k]] = props[k]; }
  return css;
}

function applyStyles(el, styleObj){
  el.removeAttribute('style');
  for(const prop in styleObj){ el.style[toCamel(prop)] = styleObj[prop]; }
}
function toCamel(cssProp){
  return cssProp.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
}

function renderProgress(){
  progressEl.innerHTML = "";
  LEVELS.forEach((lvl, i) => {
    const d = document.createElement('div');
    let cls = "dot";
    if(i > state.unlocked) cls += " locked";
    if(i === state.currentLevel) cls += " current";
    if(state.completed[i]) cls += " done";
    d.className = cls;
    d.innerHTML = `<span class="n">0${i+1}</span>${lvl.title}`;
    if(i <= state.unlocked){
      d.addEventListener('click', () => { loadLevel(i); });
    }
    progressEl.appendChild(d);
  });
}

function makeCells(container, count){
  container.innerHTML = "";
  for(let i=1;i<=count;i++){
    const c = document.createElement('div');
    c.className = "cell";
    c.textContent = String(i).padStart(2,'0');
    container.appendChild(c);
  }
}

function loadLevel(index){
  state.currentLevel = index;
  state.selections = {};
  state.wrongAttempts = 0;
  state.hintUsed = false;
  const lvl = LEVELS[index];
  lvl.properties.forEach(p => { state.selections[p.key] = null; });
  renderProgress();
  renderLevel();
}

function renderLevel(){
  const lvl = LEVELS[state.currentLevel];
  gameArea.innerHTML = "";

  if(state.currentLevel >= LEVELS.length){
    renderFinale();
    return;
  }

  const panel = document.createElement('div');
  panel.className = "panel";

  panel.innerHTML = `
    <div class="level-head">
      <h2>${lvl.title}</h2>
      <span class="level-tag">${lvl.tag}</span>
    </div>
    <p class="brief">${lvl.brief}</p>
    <div class="stage">
      <div class="blueprint">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <span class="caption">Target</span>
        <div class="grid-box" id="targetBox"></div>
      </div>
      <div class="blueprint">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <span class="caption">Your Grid</span>
        <div class="grid-box" id="liveBox"></div>
      </div>
    </div>
    <div id="controls"></div>
    <div class="action-row">
      <button class="primary" id="checkBtn">Check Layout</button>
      <button class="ghost" id="hintBtn">💡 Hint</button>
    </div>
    <div class="feedback" id="feedbackBox"></div>
  `;
  gameArea.appendChild(panel);

  // target preview
  const targetBox = document.getElementById('targetBox');
  makeCells(targetBox, lvl.cells);
  applyStyles(targetBox, buildStyleObject({...lvl.base, ...lvl.target}));

  // live preview
  const liveBox = document.getElementById('liveBox');
  makeCells(liveBox, lvl.cells);
  applyStyles(liveBox, buildStyleObject(lvl.base));

  // controls
  const controls = document.getElementById('controls');
  lvl.properties.forEach(p => {
    const group = document.createElement('div');
    group.className = "control-group";
    const label = document.createElement('span');
    label.className = "prop-label mono";
    label.textContent = p.css;
    group.appendChild(label);
    const row = document.createElement('div');
    row.className = "opt-row";
    p.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = "opt-btn mono";
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        state.selections[p.key] = opt;
        row.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateLivePreview();
      });
      row.appendChild(btn);
    });
    group.appendChild(row);
    controls.appendChild(group);
  });

  document.getElementById('checkBtn').addEventListener('click', checkAnswer);
  document.getElementById('hintBtn').addEventListener('click', showHint);

  updateScore();
}

function updateLivePreview(){
  const lvl = LEVELS[state.currentLevel];
  const liveBox = document.getElementById('liveBox');
  const merged = {...lvl.base, ...state.selections};
  const cleaned = {};
  for(const k in merged){ if(merged[k] !== null && merged[k] !== undefined) cleaned[k] = merged[k]; }
  applyStyles(liveBox, buildStyleObject(cleaned));
}

function showHint(){
  const lvl = LEVELS[state.currentLevel];
  state.hintUsed = true;
  const fb = document.getElementById('feedbackBox');
  fb.className = "feedback hint show";
  fb.textContent = "HINT — " + lvl.hint;
}

function checkAnswer(){
  const lvl = LEVELS[state.currentLevel];
  const allSelected = lvl.properties.every(p => state.selections[p.key] !== null);
  const fb = document.getElementById('feedbackBox');

  if(!allSelected){
    fb.className = "feedback bad show";
    fb.textContent = "Select a value for every property before checking.";
    return;
  }

  const correct = lvl.properties.every(p => state.selections[p.key] === lvl.target[p.key]);

  if(correct){
    let points = 100 - (state.wrongAttempts * 15) - (state.hintUsed ? 20 : 0);
    if(points < 40) points = 40;
    state.score += points;
    state.completed[state.currentLevel] = true;
    if(state.unlocked < state.currentLevel + 1) state.unlocked = state.currentLevel + 1;
    updateScore();
    renderProgress();

    fb.className = "feedback good show";
    fb.textContent = `CORRECT — Blueprint matched. +${points} points.`;

    document.getElementById('checkBtn').disabled = true;
    document.getElementById('hintBtn').disabled = true;
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

    const actionRow = document.querySelector('.action-row');
    const nextBtn = document.createElement('button');
    nextBtn.className = "primary";
    nextBtn.textContent = state.currentLevel < LEVELS.length - 1 ? "Next Level →" : "See Results →";
    nextBtn.addEventListener('click', () => {
      if(state.currentLevel < LEVELS.length - 1){
        loadLevel(state.currentLevel + 1);
      } else {
        state.currentLevel = LEVELS.length;
        renderLevel();
      }
    });
    actionRow.appendChild(nextBtn);
  } else {
    state.wrongAttempts += 1;
    fb.className = "feedback bad show";
    fb.textContent = "Not quite — the live grid doesn't match the target yet. Compare the two blueprints and try again.";
  }
}

function renderFinale(){
  const totalMax = LEVELS.length * 100;
  const panel = document.createElement('div');
  panel.className = "panel finale";
  panel.innerHTML = `
    <div class="level-tag">QUEST COMPLETE</div>
    <h2>Blueprint Fully Drafted</h2>
    <div class="big">${state.score} <span style="font-size:18px; color:var(--ink-soft);">/ ${totalMax}</span></div>
    <p class="brief" style="margin:0 auto 20px;">You've covered display, columns, gap, repeat(), independent axis spacing, and a full combined layout.</p>
    <button class="primary" id="restartBtn">Restart Quest</button>
  `;
  gameArea.appendChild(panel);
  document.getElementById('restartBtn').addEventListener('click', () => {
    state = { currentLevel:0, unlocked:0, score:0, selections:{}, wrongAttempts:0, hintUsed:false, feedback:null, completed:[] };
    renderProgress();
    loadLevel(0);
  });
}

function updateScore(){
  scoreVal.textContent = state.score;
}

/* ---------- Theme toggle ---------- */
document.getElementById('themeToggle').addEventListener('click', () => {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '◐' : '◑';
});

/* ---------- Init ---------- */
renderProgress();
loadLevel(0);
</script>
</body>
</html>
